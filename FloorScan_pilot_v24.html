  main.appendChild(el('div', { class: 'gpi-eyebrow' }, 'Werkbon ' + w.number));
  main.appendChild(el('h2', {}, w.description || 'Werkbon'));
  main.appendChild(el('hr', { class: 'gpi-rule' }));
  main.appendChild(el('dl', { class: 'meta' },
    el('dt', {}, 'Zone'), el('dd', {}, w.zone)
  ));

  // Quick-actions: huidige week + QR-sticker
  const quick = el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;' });
  const currentWeekObj = (w.weeks || []).find(x => x.week === cw);
  if (currentWeekObj) {
    quick.appendChild(el('button', { class: 'btn primary', onClick: () => navigate('week', { weekId: currentWeekObj.id }) },
      '\u2192 Open W' + cw + ' (deze week)'));
  } else {
    quick.appendChild(el('button', { class: 'btn primary', onClick: () => createCurrentWeekAndOpen(w) },
      '+ Maak W' + cw + ' (deze week)'));
  }
  quick.appendChild(el('button', { class: 'btn', onClick: () => showQrCodeForWerkbon(p, w) },
    '\ud83d\udd33 Toon QR-code'));
  main.appendChild(quick);

  main.appendChild(el('h3', {}, 'Weken'));
  if (!w.weeks.length) {
    main.appendChild(el('div', { class: 'empty' },
      el('p', {}, 'Nog geen week-registraties voor deze werkbon.'),
      el('p', {}, el('button', { class: 'btn primary', onClick: showWeekModal }, '+ Week toevoegen'))
    ));
  } else {
    w.weeks.slice().sort((a, b) => b.week - a.week).forEach(week => {
      const st = weekStatus(week);
      const isCurrent = week.week === cw;
      const cardClass = 'card' + (isCurrent ? ' current-week' : '');
      main.appendChild(el('div', { class: cardClass },
        el('div', { class: 'card-row', onClick: () => navigate('week', { weekId: week.id }) },
          el('div', {},
            el('div', { class: 'card-title' }, 'W' + week.week + (isCurrent ? '  \u2014 deze week' : '') + ' \u2014 streef ' + week.streef_pct + '%' + (week.uurSummary ? ' \u00b7 ' + week.uurSummary : '')),
            el('div', { class: 'card-sub' }, (week.weekdoel || '\u2014') + ' \u00b7 bevestigd: ' + (week.confirmed_pct ?? '\u2014') + '%')
          ),
          el('span', { class: 'dot ' + st })
        )
      ));
    });
    main.appendChild(el('div', { style: 'margin-top: 16px;' },
      el('button', { class: 'btn', onClick: showWeekModal }, '+ Week toevoegen')
    ));
  }
}

function createCurrentWeekAndOpen(werkbon) {
  const cw = getCurrentWeek();
  const id = uid();
  werkbon.weeks = werkbon.weeks || [];
  werkbon.weeks.push({ id, week: cw, weekdoel: '', streef_pct: 50, photos: [], ai_pct: null, ai_toelichting: '', confirmed_pct: null, remark: '' });
  save(); navigate('week', { weekId: id });
}

// ---------- View: Week (overleg-view) ----------
function renderWeek(main) {
  const project = getProject();
  const werkbon = getWerkbon();
  const week = getWeek();
  if (!week) return navigate('home');

  const st = weekStatus(week);
  const stLabel = { green: 'Op schema', amber: 'Achter op schema', red: 'Ruim achter', grey: 'Nog geen % bevestigd' }[st];
  const cw = getCurrentWeek();
  const isCurrent = week.week === cw;
  main.appendChild(el('div', { class: 'gpi-eyebrow' }, project.number + ' \u00b7 Werkbon ' + werkbon.number));
  const headerRow = el('div', { style: 'display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin: 4px 0 0;' });
  headerRow.appendChild(el('h2', { style: 'margin: 0;' }, 'Week ' + week.week));
  if (isCurrent) {
    headerRow.appendChild(el('span', { class: 'week-pill' }, '\u2605 Huidige week'));
  } else if (week.week < cw) {
    headerRow.appendChild(el('span', { class: 'week-pill grey' }, 'Eerdere week'));
  } else {
    headerRow.appendChild(el('span', { class: 'week-pill amber' }, 'Toekomstige week'));
  }
  main.appendChild(headerRow);
  main.appendChild(el('hr', { class: 'gpi-rule' }));
  main.appendChild(el('div', { class: 'status-banner ' + st }, stLabel + (week.confirmed_pct != null ? ' \u2014 bevestigd ' + week.confirmed_pct + '% (streef ' + week.streef_pct + '%)' : '')));

  const panels = el('div', { class: 'panels' });

  const pDoel = el('div', { class: 'panel' });
  pDoel.appendChild(el('div', { class: 'panel-label' }, 'Weekdoel \u00b7 W' + week.week));
  pDoel.appendChild(el('div', { class: 'panel-sub' }, 'streef ' + week.streef_pct + '%'));
  // Weekdoel als afvinkbare checklist — leesbaar op werkvloer
  const taskList = (week.tasks && week.tasks.length) ? week.tasks
                 : (week.weekdoel ? week.weekdoel.split(/\s*·\s*|\n+/).map(s => s.trim()).filter(Boolean) : []);
  if (!week.tasks_done) week.tasks_done = {};
  if (taskList.length === 0) {
    pDoel.appendChild(el('div', { style: 'font-size: 15px; margin-bottom: 12px; color: var(--grey-500); font-style: italic;' }, '(geen weekdoel ingevuld)'));
  } else {
    const checklist = el('div', { class: 'task-checklist' });
    taskList.forEach((taskText, idx) => {
      const id = 'task-' + week.id + '-' + idx;
      const isDone = !!week.tasks_done[taskText];
      const row = el('label', { class: 'task-row' + (isDone ? ' done' : ''), htmlFor: id });
      const cb = el('input', { type: 'checkbox', id: id, onChange: e => {
        if (e.target.checked) week.tasks_done[taskText] = new Date().toISOString();
        else delete week.tasks_done[taskText];
        const allDone = taskList.every(t => week.tasks_done[t]);
        if (allDone && week.confirmed_pct == null) week.confirmed_pct = 100;
        save(); render();
      } });
      if (isDone) cb.setAttribute('checked', '');
      row.appendChild(cb);
      row.appendChild(el('span', { class: 'task-text' }, taskText));
      checklist.appendChild(row);
    });
    pDoel.appendChild(checklist);
    const doneCount = taskList.filter(t => week.tasks_done[t]).length;
    pDoel.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 10px; text-align: right;' }, doneCount + '/' + taskList.length + ' afgevinkt'));
  }
  if (week.uurSummary) {
    pDoel.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 10px; font-family: monospace;' }, 'Uit Excel: ' + week.uurSummary + (week.excel_status ? ' \u00b7 status 1' : '')));
  }
  pDoel.appendChild(el('div', { class: 'progress' }, el('div', { class: 'progress-fill', style: 'width: ' + week.streef_pct + '%' })));

  if (week.ai_pct != null) {
    pDoel.appendChild(el('div', { class: 'ai-box' },
      el('div', { class: 'lbl' }, 'AI-voorstel'),
      el('div', { class: 'val' }, '\u00b1' + week.ai_pct + '%'),
      el('div', { class: 'text' }, week.ai_toelichting || '\u2014')
    ));
  } else {
    pDoel.appendChild(el('div', { class: 'ai-box empty' },
      el('div', { class: 'lbl' }, 'AI-voorstel'),
      el('div', { class: 'val' }, 'Nog niet ingevuld'),
      el('div', { class: 'text' }, 'Gebruik de knop rechts om een prompt te genereren en plak Claude\u2019s antwoord met \u201CAI-antwoord invoeren\u201D.')
    ));
  }

  pDoel.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 500;' }, 'Bevestig voortgang'));
  const pctGrid = el('div', { class: 'pct-grid' });
  [25, 50, 75, 100].forEach(pct => {
    const classes = ['pct-btn'];
    if (week.confirmed_pct === pct) classes.push('active');
    else if (week.confirmed_pct == null && week.ai_pct != null && pct === closestPct(week.ai_pct)) classes.push('ai-suggested');
    pctGrid.appendChild(el('button', {
      class: classes.join(' '),
      onClick: () => { week.confirmed_pct = pct; week.confirmed_at = new Date().toISOString(); save(); render(); }
    }, pct + '%'));
  });
  pDoel.appendChild(pctGrid);

  if (week.confirmed_pct != null) {
    pDoel.appendChild(el('div', { style: 'margin-top: 8px; font-size: 12px; color: var(--grey-500);' },
      'Bevestigd: ' + week.confirmed_pct + '% \u00b7 ',
      el('button', { class: 'btn sm ghost', onClick: () => { week.confirmed_pct = null; save(); render(); } }, 'wijzigen')
    ));
  }

  pDoel.appendChild(el('div', { class: 'field', style: 'margin-top: 16px;' },
    el('label', {}, 'Opmerking'),
    el('textarea', {
      placeholder: 'Bijv. wacht op levering flens N04',
      onInput: e => { week.remark = e.target.value; save(); }
    }, week.remark || '')
  ));
  panels.appendChild(pDoel);

  const pFotos = el('div', { class: 'panel' });
  pFotos.appendChild(el('div', { class: 'panel-label' }, 'Foto\u2019s werkvloer'));
  pFotos.appendChild(el('div', { class: 'panel-sub' }, (week.photos || []).length + ' foto\u2019s'));

  // Speciaal: drie zijden-foto's (voor / zijde / achter) \u2014 gevuld via QR-flow of camera
  if (!week.sides) week.sides = { voor: null, zijde: null, achter: null };
  const sideKeys = ['voor', 'zijde', 'achter'];

  // Helpers voor de side-lightbox: actuele state ophalen + delete-callback
  const getFilledSides = () => sideKeys
    .map(k => ({ key: k, photo: week.sides[k] }))
    .filter(item => item.photo);

  const openSideLightbox = (startKey) => {
    const initial = getFilledSides();
    if (!initial.length) return;
    let startIdx = initial.findIndex(item => item.key === startKey);
    if (startIdx < 0) startIdx = 0;
    openPhotoLightbox(
      () => getFilledSides().map(item => item.photo),
      startIdx,
      {
        title: (i) => {
          const items = getFilledSides();
          return items[i] ? 'Zijde: ' + items[i].key.toUpperCase() : 'Zijde';
        },
        onDelete: (i) => {
          const items = getFilledSides();
          const k = items[i] && items[i].key;
          if (!k) return;
          week.sides[k] = null;
          save(); render();
        },
        extraActions: [
          {
            label: '\ud83d\udcf7 Opnieuw maken',
            onClick: (i) => {
              const items = getFilledSides();
              const currentKey = (items[i] && items[i].key) || startKey;
              closeModal();
              captureSidePhoto(week, currentKey);
            }
          }
        ]
      }
    );
  };

  const sideRow = el('div', { class: 'photo-side-row' });
  sideKeys.forEach(key => {
    const filled = !!week.sides[key];
    const cell = el('div', { class: 'photo-side' + (filled ? '' : ' empty') });
    if (filled) {
      cell.appendChild(el('img', { src: week.sides[key] }));
      cell.appendChild(el('span', { class: 'side-label' }, key));
      // Tik op een gevulde cel \u2192 open lightbox-gallery met alle 3 zijden
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        openSideLightbox(key);
      });
    } else {
      cell.appendChild(el('span', {}, key.toUpperCase() + '\nnog geen foto'));
      // Tik op een lege cel \u2192 camera-flow voor die zijde
      cell.addEventListener('click', () => captureSidePhoto(week, key));
    }
    sideRow.appendChild(cell);
  });
  pFotos.appendChild(sideRow);
  pFotos.appendChild(el('div', { style: 'display: flex; gap: 6px; margin-bottom: 12px;' },
    el('button', { class: 'btn primary', style: 'flex: 1;', onClick: () => start3SidePhotoFlow(week) }, '\ud83d\udcf7 Maak 3 foto\u2019s (voor \u00b7 zijde \u00b7 achter)')
  ));

  if ((week.photos || []).length > 0) {
    // Helpers voor de lightbox: getter (zodat verwijderen live doorwerkt) + delete-callback
    const getWeekPhotos = () => week.photos || [];
    const deleteAt = (i) => {
      if (!week.photos) return;
      week.photos.splice(i, 1);
      save(); render();
    };
    // Hero \u2014 klik opent lightbox op de eerste foto
    const hero = el('div', { class: 'photo-hero photo-hero-hint',
      onClick: () => openPhotoLightbox(getWeekPhotos, 0, { onDelete: deleteAt, title: 'W' + week.week })
    }, el('img', { src: week.photos[0] }));
    pFotos.appendChild(hero);
    // Thumbnail-grid \u2014 klik opent lightbox op die specifieke foto
    const grid = el('div', { class: 'photos' });
    (week.photos || []).forEach((p, i) => {
      const thumb = el('div', { class: 'photo-thumb' });
      thumb.appendChild(el('img', { src: p,
        onClick: (e) => { e.stopPropagation(); openPhotoLightbox(getWeekPhotos, i, { onDelete: deleteAt, title: 'W' + week.week }); }
      }));
      thumb.appendChild(el('button', { class: 'del', onClick: (e) => {
        e.stopPropagation();
        if (confirm('Foto verwijderen?')) { week.photos.splice(i, 1); save(); render(); }
      } }, '\u00d7'));
      grid.appendChild(thumb);
    });
    pFotos.appendChild(grid);
  }

  const extraRow = el('div', { style: 'display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;' });
  extraRow.appendChild(el('button', { class: 'btn', style: 'flex: 1; min-height: 44px;', onClick: () => {
    const cb = dataUrl => { if (!week.photos) week.photos = []; week.photos.push(dataUrl); save(); render(); };
    if (cameraAvailable()) openInAppCameraModal(cb);
    else triggerNativeCameraInput(cb);
  } }, '\ud83d\udcf7 Foto maken'));
  const upload = el('label', { class: 'btn', style: 'flex: 1; min-height: 44px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;' },
    '\ud83d\uddbc Bestaande foto kiezen',
    el('input', { type: 'file', accept: 'image/*', multiple: '', style: 'display: none;', onChange: async e => {
      const files = Array.from(e.target.files);
      for (const f of files) {
        const dataUrl = await processPhoto(f);
        if (!week.photos) week.photos = [];
        week.photos.push(dataUrl);
      }
      save(); render();
    } })
  );
  extraRow.appendChild(upload);
  pFotos.appendChild(extraRow);

  pFotos.appendChild(el('div', { style: 'margin-top: 14px; display: flex; flex-direction: column; gap: 6px;' },
    el('button', { class: 'btn primary', onClick: () => { copyToClipboard(buildAiPrompt(project, werkbon, week)); } }, 'Kopieer AI-prompt'),
    el('button', { class: 'btn', onClick: () => showAiInputModal(week) }, 'AI-antwoord invoeren')
  ));
  panels.appendChild(pFotos);

  main.appendChild(panels);

  main.appendChild(el('div', { style: 'margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--grey-100); display: flex; gap: 8px; flex-wrap: wrap;' },
    el('button', { class: 'btn', onClick: () => showWeekEditModal(week) }, 'Weekdoel / streef bewerken'),
    el('button', { class: 'btn sm ghost danger', onClick: () => {
      if (confirm('Week W' + week.week + ' verwijderen?')) {
        werkbon.weeks = werkbon.weeks.filter(x => x.id !== week.id);
        save(); navigate('werkbon', { weekId: null });
      }
    } }, 'Week verwijderen')
  ));
}

function closestPct(val) {
  return [25, 50, 75, 100].reduce((best, p) => Math.abs(p - val) < Math.abs(best - val) ? p : best, 25);
}

// ---------- Modals ----------
function renderModal() {
  const bg = el('div', { class: 'modal-bg', onClick: e => { if (e.target === bg) closeModal(); } });
  const m = el('div', { class: 'modal' });
  state.modal.render(m);
  bg.appendChild(m);
  return bg;
}
function closeModal() {
  if (state.modal && typeof state.modal.onClose === 'function') {
    try { state.modal.onClose(); } catch (e) {}
  }
  state.modal = null; render();
}

// Lightbox-modal voor foto's: groot beeld met prev/volgende/delete navigatie.
// getPhotos = callback die de actuele array teruggeeft (zodat delete live doorwerkt).
// opts.onDelete(idx) = callback om foto te verwijderen (optioneel; geen knop als ontbreekt).
// opts.title = optionele kop boven de foto.
// opts.extraActions = [{label, onClick}] — extra knoppen onder de foto (bv. "Opnieuw maken").
function openPhotoLightbox(getPhotos, startIdx, opts) {
  let idx = startIdx || 0;
  const onDelete = opts && opts.onDelete;
  const titleOpt = opts && opts.title;
  const extraActions = (opts && Array.isArray(opts.extraActions)) ? opts.extraActions : [];
  state.modal = {
    onClose: () => {},
    render: m => {
      // Override de standaard 500px max-width voor zo groot mogelijk beeld
      m.style.maxWidth = '98vw';
      m.style.maxHeight = '95vh';
      m.style.padding = '8px';
      const photos = getPhotos() || [];
      if (!photos.length) { state.modal = null; render(); return; }
      if (idx >= photos.length) idx = photos.length - 1;
      if (idx < 0) idx = 0;

      // Title kan string of functie(idx) zijn
      const titleStr = (typeof titleOpt === 'function') ? (titleOpt(idx) || '')
                     : (typeof titleOpt === 'string') ? titleOpt : '';

      m.appendChild(el('div', { style: 'display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px;' },
        el('div', { style: 'font-size:14px; font-weight:500;' },
          (titleStr ? titleStr + (photos.length > 1 ? ' — ' : '') : '') +
          (photos.length > 1 ? 'Foto ' + (idx + 1) + ' van ' + photos.length : '')),
        el('button', { class: 'btn sm', onClick: closeModal }, '✕ Sluiten')
      ));

      const imgWrap = el('div', { style: 'background:var(--grey-900); border-radius:var(--radius); overflow:hidden; display:flex; align-items:center; justify-content:center; min-height:200px;' });
      imgWrap.appendChild(el('img', {
        src: photos[idx],
        style: 'max-width:100%; max-height:82vh; width:auto; height:auto; object-fit:contain; display:block;'
      }));
      m.appendChild(imgWrap);

      const nav = el('div', { style: 'display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;' });
      if (photos.length > 1) {
        nav.appendChild(el('button', {
          class: 'btn',
          style: 'flex:1; min-height:48px; min-width:120px;' + (idx === 0 ? ' opacity:0.4; pointer-events:none;' : ''),
          onClick: () => { if (idx > 0) { idx--; render(); } }
        }, '← Vorige'));
      }
      if (onDelete) {
        nav.appendChild(el('button', {
          class: 'btn danger',
          style: 'min-height:48px;',
          onClick: () => {
            if (!confirm('Foto verwijderen?')) return;
            try { onDelete(idx); } catch (e) { console.warn(e); }
            render();
          }
        }, '🗑 Verwijder'));
      }
      extraActions.forEach(act => {
        nav.appendChild(el('button', {
          class: 'btn',
          style: 'min-height:48px;',
          onClick: () => { try { act.onClick && act.onClick(idx); } catch (e) { console.warn(e); } }
        }, act.label));
      });
      if (photos.length > 1) {
        nav.appendChild(el('button', {
          class: 'btn',
          style: 'flex:1; min-height:48px; min-width:120px;' + (idx >= photos.length - 1 ? ' opacity:0.4; pointer-events:none;' : ''),
          onClick: () => { if (idx < photos.length - 1) { idx++; render(); } }
        }, 'Volgende →'));
      }
      m.appendChild(nav);

      m.appendChild(el('div', { style: 'font-size:12px; color:var(--grey-500); text-align:center; margin-top:10px;' },
        photos.length > 1 ? 'Wissel met ← / → · Tik buiten de foto om te sluiten' : 'Tik buiten de foto om te sluiten'));
    }
  };
  render();
}

function showWeekModal() {
  let weekNr = getCurrentWeek(), doel = '', streef = 50;

// ISO 8601 weeknummer (Europa-standaard, maandag = eerste dag)
function getCurrentWeek(ref) {
  const d = new Date(ref || new Date());
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = u.getUTCDay() || 7;
  u.setUTCDate(u.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(u.getUTCFullYear(), 0, 1));
  return Math.ceil((((u - yearStart) / 86400000) + 1) / 7);
}
function getCurrentWeekYear(ref) {
  const d = new Date(ref || new Date());
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = u.getUTCDay() || 7;
  u.setUTCDate(u.getUTCDate() + 4 - day);
  return u.getUTCFullYear();
}
function getWeekDateRange(weekNr, year) {
  year = year || getCurrentWeekYear();
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Day = jan4.getUTCDay() || 7;
  const mondayOfWeek1 = new Date(jan4);
  mondayOfWeek1.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
  const monday = new Date(mondayOfWeek1);
  monday.setUTCDate(mondayOfWeek1.getUTCDate() + (weekNr - 1) * 7);
  const friday = new Date(monday);
  friday.setUTCDate(monday.getUTCDate() + 4);
  const fmt = d => d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', timeZone: 'UTC' });
  return fmt(monday) + ' – ' + fmt(friday);
}

// ---------- QR-scan & QR-generatie ----------
//
// QR-payload (primair formaat): "<projectnummer>-<werkbonnummer>"
// Voorbeeld: "325277-10300" (project 325277, suborder 10, X=3 = Bottom, UU=00 = hoofd-werkbon)
//
let qrScanner = null;

function parseQrPayload(text) {
  if (!text) return null;
  const t = String(text).trim();

  // Format 1: JSON-payload (eigen Gpi format)
  if (t.startsWith('{')) {
    try {
      const j = JSON.parse(t);
      const proj = j.p || j.project || j.projectnummer;
      const wb = j.w || j.wb || j.werkbon || j.werkbonnummer;
      if (proj && wb) return { kind: 'standard', project: String(proj), werkbon: String(wb), raw: t };
    } catch (e) {}
  }

  // Format 2: URL met ?p=&w= parameters (eigen Gpi format)
  if (/^https?:\/\//i.test(t)) {
    try {
      const url = new URL(t);
      const proj = url.searchParams.get('p') || url.searchParams.get('project');
      const wb = url.searchParams.get('w') || url.searchParams.get('werkbon');
      if (proj && wb) return { kind: 'standard', project: proj, werkbon: wb, raw: t };
    } catch (e) {}
  }

  // Format 3: Smarticate-fallback — herkent SPCPART-id ergens in payload (URL of plain).
  // Smarticate-stickers bevatten alleen een verwijzing (vermoedelijk naar hun cloud), zonder
  // direct project/werkbon-info. Resolve handmatig via cache (zie resolveSpcpartAndContinue).
  const spcMatch = t.match(/SPCPART[\-_]?(\d+)/i);
  if (spcMatch) {
    return { kind: 'spcpart', spcpartId: 'SPCPART' + spcMatch[1], raw: t };
  }

  // Format 4: <projectnr>-<werkbonnr> en variaties (Gpi standaard sticker)
  const cleaned = t.replace(/^FS[:|\-]/i, '');
  const parts = cleaned.split(/[|;\/\-_,\s]+/).map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2 && /^\d+$/.test(parts[0]) && /^\w+$/.test(parts[1])) {
    return { kind: 'standard', project: parts[0], werkbon: parts[1], raw: t };
  }

  return null;
}

// SPCPART-resolve cache: { "SPCPART213013": { project, werkbon, desc, resolvedAt } }
function getSpcpartCache() {
  try { return JSON.parse(localStorage.getItem('floorscan_spcpart_map') || '{}'); }
  catch (e) { return {}; }
}
function saveSpcpartMapping(spcpartId, project, werkbon, desc) {
  const cache = getSpcpartCache();
  cache[spcpartId] = {
    project: String(project),
    werkbon: String(werkbon),
    desc: desc || '',
    resolvedAt: new Date().toISOString()
  };
  localStorage.setItem('floorscan_spcpart_map', JSON.stringify(cache));
}

}

function inferPartFromWerkbonNr(wb) {
  const s = String(wb).trim();
  const m = s.match(/^(\d{2})(\d)(\d{2})$/);
  if (!m) return { part: 'L', zone: 'Hal L', isPrep: false, isHead: false };
  const X = parseInt(m[2]);
  const UU = parseInt(m[3]);
  const isHead = UU >= 70 && UU <= 89;
  const isPrep = UU > 0 && !isHead;
  if (isHead) return { part: 'TB', zone: 'TB', isPrep: false, isHead: true };
  if (isPrep) return { part: 'PREP', zone: 'PREP', isPrep: true, isHead: false };
  switch (X) {
    case 1: return { part: 'M', zone: 'Hal M', desc: 'Top assembly' };
    case 3: return { part: 'M', zone: 'Hal M', desc: 'Bottom assembly' };
    case 4: return { part: 'L', zone: 'Hal L', desc: 'Final assembly' };
    case 5: return { part: 'M', zone: 'Hal M', desc: 'Skirt / support' };
    case 7: return { part: 'ISO', zone: 'ISO', desc: 'Insulation' };
    case 9: return { part: 'L', zone: 'Hal L', desc: 'Installation equipment' };
    default: return { part: 'L', zone: 'Hal L' };
  }
}

async function scanQrFromImageFile(file) {
  try {
    if (qrScanner) { try { await qrScanner.stop(); qrScanner.clear(); } catch(e){} qrScanner = null; }
    let target = document.getElementById('qr-reader');
    if (!target) {
      target = document.createElement('div');
      target.id = 'qr-reader-tmp';
      target.style.display = 'none';
      document.body.appendChild(target);
    }
    const tmpId = target.id;
    const inst = new Html5Qrcode(tmpId);
    const decoded = await inst.scanFile(file, false);
    try { inst.clear(); } catch (e) {}
    if (target.id === 'qr-reader-tmp') target.remove();
    const parsed = parseQrPayload(decoded);
    if (!parsed) { alert('QR-code gevonden maar onbekend formaat: ' + decoded); return; }
    closeModal();
    if (parsed.kind === 'spcpart') {
      resolveSpcpartAndContinue(parsed);
    } else {
      resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);
    }
  } catch (e) {
    alert('Geen QR-code gevonden in de foto: ' + (e && e.message ? e.message : e));
  }
}

async function initQrScanner(statusEl) {
  try {
    qrScanner = new Html5Qrcode('qr-reader');
    const config = { fps: 10, qrbox: { width: 240, height: 240 } };
    await qrScanner.start(
      { facingMode: 'environment' },
      config,
      decodedText => onQrDecoded(decodedText, statusEl),
      () => {}
    );
    if (statusEl) statusEl.textContent = 'Camera actief — richt op QR';
  } catch (e) {
    if (statusEl) statusEl.innerHTML = 'Kon camera niet starten: ' + (e && e.message ? e.message : e);
  }
}

async function stopQrScanner() {
  if (qrScanner) {
    try { await qrScanner.stop(); qrScanner.clear(); } catch (e) {}
    qrScanner = null;
  }
}

async function onQrDecoded(text, statusEl) {
  const parsed = parseQrPayload(text);
  if (!parsed) {
    if (statusEl) statusEl.textContent = 'Onbekende QR-code: ' + text.slice(0, 40);
    return;
  }
  await stopQrScanner();
  closeModal();
  if (parsed.kind === 'spcpart') {
    resolveSpcpartAndContinue(parsed);
  } else {
    resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);
  }
}

function promptManualQrEntry() {
  const v = prompt('Projectnummer-Werkbonnummer (bv. 325277-10300) of SPCPART-id:');
  if (!v) return;
  const parsed = parseQrPayload(v);
  if (!parsed) { alert('Onbekend formaat. Verwacht: <projectnummer>-<werkbonnummer>'); return; }
  if (parsed.kind === 'spcpart') {
    resolveSpcpartAndContinue(parsed);
  } else {
    resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);
  }
}

function resolveQrTargetAndStartPhotos(projectNumber, werkbonNumber) {
  const project = state.projects.find(p => String(p.number).trim() === String(projectNumber).trim());
  if (!project) {
    if (!confirm('Project ' + projectNumber + ' bestaat nog niet. Aanmaken?')) return;
    const newProj = { id: uid(), number: projectNumber, klant: '', description: '', werkbonnen: [] };
    state.projects.push(newProj);
    save();
    return resolveQrTargetAndStartPhotos(projectNumber, werkbonNumber);
  }
  let werkbon = project.werkbonnen.find(w => String(w.number).toUpperCase() === String(werkbonNumber).toUpperCase());
  if (!werkbon) {
    if (!confirm('Werkbon ' + werkbonNumber + ' bestaat nog niet binnen project ' + projectNumber + '. Aanmaken?')) return;
    const inf = inferPartFromWerkbonNr(werkbonNumber);
    werkbon = { id: uid(), number: werkbonNumber, description: inf.desc || werkbonNumber, zone: inf.zone, drawing_sheet: '', drawing_notes: '', weeks: [] };
    project.werkbonnen.push(werkbon);
    save();
  }
  const cw = getCurrentWeek();
  let week = werkbon.weeks.find(x => x.week === cw);
  if (!week) {
    week = { id: uid(), week: cw, weekdoel: '', streef_pct: 50, photos: [], ai_pct: null, ai_toelichting: '', confirmed_pct: null, remark: '', sides: { voor: null, zijde: null, achter: null } };
    werkbon.weeks.push(week);
    save();
  }
  state.projectId = project.id;
  state.werkbonId = werkbon.id;
  state.weekId = week.id;
  state.view = 'week';
  render();
  setTimeout(() => start3SidePhotoFlow(week), 200);
}

function printQrLabel(project, werkbon, payload) {
  const w = window.open('', '_blank', 'width=400,height=560');
  if (!w) { alert('Pop-up geblokkeerd'); return; }
  w.document.write('<html><head><title>QR ' + werkbon.number + '</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{font-family:sans-serif;text-align:center;padding:24px;}.meta{font-size:12px;color:#555;margin-top:14px;}</style></head><body><div id="q"></div><div class="meta"><b>' + project.number + '</b><br>Werkbon ' + werkbon.number + ' — ' + (werkbon.description || '') + '</div><script>setTimeout(function(){new QRCode(document.getElementById("q"),{text:"' + payload + '",width:240,height:240});setTimeout(function(){window.print();},200);},150);<\/script></body></html>');
  w.document.close();
}

// Camera-capture: in-app camera met preview, fallback naar OS camera-app
function captureSidePhoto(week, key) {
  const cb = async dataUrl => {
    if (!week.sides) week.sides = { voor: null, zijde: null, achter: null };
    week.sides[key] = dataUrl;
    save(); render();
    toast('Foto ' + key + ' opgeslagen');
  };
  if (cameraAvailable()) openInAppCameraModal(cb);
  else triggerNativeCameraInput(cb);
}

function triggerNativeCameraInput(callback) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.setAttribute('accept', 'image/*');
  inp.setAttribute('capture', 'environment');
  inp.style.position = 'fixed';
  inp.style.left = '-9999px';
  inp.onchange = async e => {
    const f = e.target.files && e.target.files[0];
    inp.remove();
    if (!f) return;
    const dataUrl = await processPhoto(f);
    callback(dataUrl);
  };
  document.body.appendChild(inp);
  inp.click();
}

function openInAppCameraModal(callback) {
  let stream = null;
  state.modal = {
    onClose: () => { if (stream) stream.getTracks().forEach(t => t.stop()); },
    render: m => {
      m.appendChild(el('h3', {}, 'Foto maken'));
      const wrap = el('div', { style: 'background: black; border-radius: var(--radius); overflow: hidden; aspect-ratio: 3/4; max-height: 60vh; margin-bottom: 12px;' });
      const video = el('video', { autoplay: '', playsinline: '', muted: '', style: 'width: 100%; height: 100%; object-fit: cover; display: block;' });
      wrap.appendChild(video);
      m.appendChild(wrap);
      const status = el('div', { style: 'font-size: 12px; color: var(--grey-500); text-align: center; margin-bottom: 8px;' }, 'Camera opstarten…');
      m.appendChild(status);
      const actions = el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap;' });
      actions.appendChild(el('button', { class: 'btn', style: 'flex: 1;', onClick: closeModal }, 'Annuleer'));
      const shootBtn = el('button', { class: 'btn primary lg', style: 'flex: 2;', disabled: '', onClick: () => {
        try {
          const canvas = document.createElement('canvas');
          const w = video.videoWidth || 1024, h = video.videoHeight || 768;
          const maxW = 1200, scale = Math.min(1, maxW / w);
          canvas.width = Math.round(w * scale); canvas.height = Math.round(h * scale);
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.78);
          if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
          closeModal();
          callback(dataUrl);
        } catch (e) { alert('Foto maken mislukt: ' + e.message); }
      } }, '📸 Maak foto');
      actions.appendChild(shootBtn);
      m.appendChild(actions);
      m.appendChild(el('div', { style: 'margin-top: 8px; text-align: center;' },
        el('button', { class: 'btn ghost sm', onClick: () => {
          if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
          closeModal();
          triggerNativeCameraInput(callback);
        } }, 'Gebruik OS camera-app')
      ));
      navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
        .then(s => {
          stream = s; video.srcObject = s; video.play().catch(() => {});
          status.textContent = 'Klaar — richt en tik op "Maak foto"';
          shootBtn.removeAttribute('disabled');
        })
        .catch(err => {
          status.innerHTML = 'Camera niet beschikbaar (' + (err.name || err) + ') — gebruik OS camera-app.';
        });
    }
  };
  render();
}

function start3SidePhotoFlow(week) {
  if (!week.sides) week.sides = { voor: null, zijde: null, achter: null };
  const steps = ['voor', 'zijde', 'achter'];
  function renderModal(currentIdx) {
    state.modal = {
      render: m => {
        m.appendChild(el('h3', {}, '3 foto’s maken — W' + week.week));
        m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px;' }, 'Maak een foto van elke zijde.'));
        steps.forEach((s, i) => {
          const cls = 'qr-step' + (i === currentIdx ? ' active' : '') + (week.sides[s] ? ' done' : '');
          const onCapture = dataUrl => {
            week.sides[s] = dataUrl;
            save();
            const next = (i + 1 < steps.length && !week.sides[steps[i + 1]]) ? i + 1 : i;
            renderModal(next);
          };
          const step = el('div', { class: cls, onClick: () => {
            if (cameraAvailable()) openInAppCameraModal(onCapture);
            else triggerNativeCameraInput(onCapture);
          } },
            el('div', { class: 'num' }, String(i + 1)),
            el('div', {}, s.charAt(0).toUpperCase() + s.slice(1) + (week.sides[s] ? ' — gemaakt' : ''))
          );
          m.appendChild(step);
          if (week.sides[s]) {
            m.appendChild(el('div', { style: 'aspect-ratio: 4/3; border-radius: 6px; overflow: hidden; margin-bottom: 8px; max-width: 220px;' },
              el('img', { src: week.sides[s], style: 'width: 100%; height: 100%; object-fit: cover;' })
            ));
          }
        });
        const allDone = steps.every(s => week.sides[s]);
        m.appendChild(el('div', { class: 'actions' },
          el('button', { class: 'btn', onClick: closeModal }, allDone ? 'Klaar' : 'Sluiten'),
          allDone ? el('button', { class: 'btn primary', onClick: () => { closeModal(); render(); toast('3 zijden vastgelegd'); } }, 'Klaar') : null
        ));
      }
    };
    render();
  }
  renderModal(0);
}

<!-- PWA: service worker registratie + install/update UX           -->
<!-- Geïsoleerd in eigen <script> blok zodat bestaande app-logica  -->
<!-- ongewijzigd blijft. Faalt stil op file:// (geen SW mogelijk). -->
<!-- ============================================================ -->
<script>
(function pwaBootstrap() {
  'use strict';

  // 1. Service worker registratie — alleen op http(s), niet op file://
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    console.info('[FloorScan PWA] service worker overgeslagen — vereist HTTPS of localhost.');
    return;
  }

  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });

  navigator.serviceWorker.register('sw.js', { scope: './' })
    .then(reg => {
      console.info('[FloorScan PWA] service worker geregistreerd, scope:', reg.scope);

      // Detect updates → toon banner met "Bijwerken" knop
      reg.addEventListener('updatefound', () => {
        const installing = reg.installing;
        if (!installing) return;
        installing.addEventListener('statechange', () => {
          if (installing.state === 'installed' && navigator.serviceWorker.controller) {
            // Nieuwe versie staat klaar; vraag user om te verversen
            showPwaBanner({
              text: 'Nieuwe versie van FloorScan beschikbaar.',
              action: 'Bijwerken',
              onAction: () => {
                installing.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          }
        });
      });

      // Periodiek check (eens per uur in foreground) — handig op tablets die nooit echt sluiten
      setInterval(() => { reg.update().catch(() => {}); }, 60 * 60 * 1000);
    })
    .catch(err => {
      console.warn('[FloorScan PWA] service worker registratie mislukt:', err);
    });

  // 2. Install-prompt vangen (Chrome/Edge/Android)
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    // Toon alleen als de user 'm nog niet eerder heeft afgewezen deze sessie
    if (sessionStorage.getItem('floorscan_install_dismissed')) return;
    showPwaBanner({
      text: 'Installeer FloorScan op het beginscherm voor sneller starten.',
      action: 'Installeren',
      onAction: async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        try { await deferredInstallPrompt.userChoice; } catch (e) {}
        deferredInstallPrompt = null;
      }
    });
  });

  window.addEventListener('appinstalled', () => {
    console.info('[FloorScan PWA] geïnstalleerd op homescreen');
    deferredInstallPrompt = null;
    hidePwaBanner();
  });

  // 3. Banner UI (zelfstandig, geen afhankelijkheid van app render-loop)
  function showPwaBanner({ text, action, onAction }) {
    hidePwaBanner();
    const bar = document.createElement('div');
    bar.className = 'pwa-banner';
    bar.id = 'pwa-banner';
    const span = document.createElement('span');
    span.textContent = text;
    span.style.flex = '1';
    const actBtn = document.createElement('button');
    actBtn.textContent = action;
    actBtn.addEventListener('click', () => {
      try { onAction && onAction(); } catch (e) { console.warn(e); }
      hidePwaBanner();
    });
    const closeBtn = document.createElement('button');
    closeBtn.className = 'pwa-close';
    closeBtn.textContent = '×';
    closeBtn.setAttribute('aria-label', 'Sluiten');
    closeBtn.addEventListener('click', () => {
      sessionStorage.setItem('floorscan_install_dismissed', '1');
      hidePwaBanner();
    });
    bar.appendChild(span);
    bar.appendChild(actBtn);
    bar.appendChild(closeBtn);
    document.body.appendChild(bar);
  }
  function hidePwaBanner() {
    const b = document.getElementById('pwa-banner');
    if (b) b.remove();
  }
})();

// ============================================================
// PWA: inkomende bestanden via share-target en file_handlers
// ============================================================
(function pwaInbox() {
  'use strict';

  const SHARE_INBOX_DB = 'floorscan_share';
  const SHARE_INBOX_STORE = 'inbox';
  const SHARE_INBOX_KEY = 'pending';

  // 1) share-target: SW heeft een POST opgevangen, file in IDB gezet, en redirected naar
  //    deze pagina met ?share=1. Pak het bestand op en gooi het in de import-pipeline.
  async function consumeSharedInbox() {
    const url = new URL(location.href);
    if (url.searchParams.get('share') !== '1') return;
    // Maak URL meteen schoon zodat reload geen replay veroorzaakt
    history.replaceState({}, '', location.pathname);
    try {
      const item = await idbInboxGet();
      if (item) {
        await idbInboxClear();
        // Wacht tot de app gerenderd is voordat we modal openen
        await waitForAppReady();
        if (typeof processIncomingFile === 'function') {
          processIncomingFile(item, 'merge');
        } else {
          console.warn('[FloorScan PWA] processIncomingFile niet beschikbaar — app niet geladen?');
        }
      }
    } catch (err) {
      console.warn('[FloorScan PWA] shared-inbox lezen mislukt', err);
    }
  }

  // 2) file_handlers (launchQueue): user heeft "Open with FloorScan" gekozen vanuit
  //    een Files-app. Bestand komt binnen als FileSystemFileHandle.
  function consumeLaunchQueue() {
    if (!('launchQueue' in window) || !('LaunchParams' in window)) return;
    try {
      window.launchQueue.setConsumer(async (params) => {
        if (!params || !params.files || !params.files.length) return;
        await waitForAppReady();
        for (const handle of params.files) {
          try {
            const file = await handle.getFile();
            if (typeof processIncomingFile === 'function') {
              processIncomingFile(file, 'merge');
              break; // 1 bestand tegelijk verwerken
            }
          } catch (err) {
            console.warn('[FloorScan PWA] launch file lezen mislukt', err);
          }
        }
      });
    } catch (err) {
      console.warn('[FloorScan PWA] launchQueue setup mislukt', err);
    }
  }

  function waitForAppReady() {
    return new Promise(resolve => {
      const check = () => {
        if (typeof processIncomingFile === 'function' && document.getElementById('app')) {
          resolve();
        } else {
          setTimeout(check, 100);
        }
      };
      check();
    });
  }

  function idbInboxGet() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(SHARE_INBOX_DB, 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {
          db.createObjectStore(SHARE_INBOX_STORE);
        }
      };
      req.onsuccess = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {
          resolve(null); return;
        }
        const tx = db.transaction(SHARE_INBOX_STORE, 'readonly');
        const r = tx.objectStore(SHARE_INBOX_STORE).get(SHARE_INBOX_KEY);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror = () => reject(r.error);
      };
      req.onerror = () => reject(req.error);
    });
  }

  function idbInboxClear() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(SHARE_INBOX_DB, 1);
      req.onsuccess = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {
          resolve(); return;
        }
        const tx = db.transaction(SHARE_INBOX_STORE, 'readwrite');
        tx.objectStore(SHARE_INBOX_STORE).delete(SHARE_INBOX_KEY);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      };
      req.onerror = () => reject(req.error);
    });
  }

  // Start beide flows
  consumeSharedInbox();
  consumeLaunchQueue();
})();
</script>
