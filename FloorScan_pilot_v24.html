  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e; color: var(--teal); }\n.top-brand .product .name { font-size: 17px; font-weight: 600; color: var(--gpi-black); letter-spacing: -0.01em; }\n.top h1 { margin: 0; font-size: 17px; font-weight: 600; color: var(--gpi-black); display: none; } /* legacy fallback */\n.top h1 .tag { color: var(--grey-500); font-weight: 300; font-size: 13px; margin-left: 8px; }\n.top-actions { display: flex; gap: 8px; align-items: center; }\n\n/* The signature 48px teal rule — used as eyebrow underline */\n.gpi-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal); margin-top: 18px; }\n.gpi-eyebrow + h2 { margin-top: 4px; }\n.gpi-rule { border: 0; height: 2px; width: 48px; background: var(--teal); margin: 6px 0 18px; }\n\n/* Breadcrumb */\n.crumbs { padding: 12px 24px; font-size: 13px; color: var(--grey-500); border-bottom: 1px solid var(--grey-200); background: var(--bg-alt); font-weight: 400; }\n.crumbs a { color: var(--gpi-black); text-decoration: none; cursor: pointer; font-weight: 500; }\n.crumbs a:hover { color: var(--teal); }\n.crumbs .sep { margin: 0 8px; color: var(--grey-300); }\n\n/* Main */\n.main { padding: 28px 24px; }\nh2 { margin: 0 0 6px; font-size: 28px; color: var(--gpi-black); font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }\nh3 { margin: 18px 0 8px; font-size: 11px; color: var(--grey-500); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }\n\n/* Buttons — sharp, flat, decisive */\n.btn { padding: 10px 18px; font-size: 14px; border-radius: var(--radius); border: 1px solid var(--gpi-black); background: white; cursor: pointer; color: var(--gpi-black); display: inline-flex; align-items: center; gap: 8px; transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease); font-weight: 500; letter-spacing: 0.01em; }\n.btn:hover { background: var(--gpi-black); color: white; }\n.btn:active { transform: scale(0.98); }\n.btn.primary { background: var(--gpi-black); px solid var(--grey-300); border-radius: var(--radius); background: white; color: var(--gpi-black); transition: border-color var(--dur-fast) var(--ease); }\n.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 2px var(--teal); box-shadow: 0 0 0 2px rgba(0,179,160,0.25); }\n.field textarea { resize: vertical; min-height: 70px; font-family: inherit; }\n\n/* Grid */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }\n@media (max-width: 800px) { .grid-3 { grid-template-columns: 1fr; } }\n\n/* Panels */\n.panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; }\n@media (max-width: 1100px) { .panels { grid-template-columns: 1fr; } }\n.panel { background: white; border: 1px solid var(--border); border-top: 2px solid var(--teal); border-radius: var(--radius); padding: 18px 20px; }\n.panel-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--gpi-black); text-transform: uppercase; margin-bottom: 6px; }\n.panel-sub { font-size: 13px; color: var(--grey-500); margin-bottom: 16px; font-weight: 300; }\n\n/* Photos — vergroot v2.4.3 voor makkelijker terug-kijken */\n.photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }\n.photo-thumb { aspect-ratio: 1; border-radius: 6px; background: var(--grey-100); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.1s; }\n.photo-thumb:hover { transform: scale(1.02); }\n.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.photo-thumb .del { position: absolute; top: 4px; right: 4px; background: rgba(33,31,38,0.75); color: white; border: none; border-radius: 0; width: 28px; height: 28px; font-size: 16px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }\n.ph r: var(--grey-500); font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; padding-top: 2px; }\n.meta dd { margin: 0; color: var(--gpi-black); font-weight: 500; }\n\n/* Print layout (for tablet big-screen mirroring — remove app chrome) */\n@media (min-width: 1100px) {\n  .app { max-width: none; }\n}\n\n.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gpi-black); color: white; padding: 12px 22px; border-radius: var(--radius); font-size: 14px; z-index: 200; animation: toastIn 0.2s; border-left: 3px solid var(--teal); font-weight: 500; }\n@keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }\n\n/* Sync status in topbar */\n.sync-status { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; border: 1px solid var(--grey-300); background: white; color: var(--grey-700); font-weight: 500; letter-spacing: 0.02em; }\n.sync-status:hover { background: var(--bg-alt); }\n.sync-status.ok { background: var(--teal-light); border-color: var(--teal); color: var(--teal-dark); }\n.sync-status.warn { background: var(--amber-light); border-color: var(--amber); color: var(--amber-dark); }\n.sync-status.off { color: var(--grey-500); }\n.sync-status .dot { width: 8px; height: 8px; }\n.sync-meta { font-size: 11px; color: var(--grey-500); padding: 6px 24px 12px; background: var(--bg-alt); border-bottom: 1px solid var(--grey-200); font-weight: 400; }\n\n/* Current week badge / highlights */\n.week-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-pill); background: var(--teal); color: white; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }\n.week-pill.amber { background: var(--amber); color: white; }\n.week-pill.grey { background: var(--grey-200); color: var(--grey-700); }\n.card.current-week { border-color: var(--teal); border-left: 3px solid var(--teal); background: white; }\n.card.current-week .card-title::before { content: '— '; color: var(--teal); font-weight: 600; }\n\n/* Home: current-week banner — dark, with the teal-arc dashed circle motif */\n.cw-banner { background: var(--gpi-black); color: white; padding: 22px 26px; border-radius: var(--radius); margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; position: relative; overflow: hidden; }\n.cw-banner::before { content: ''; position: absolute; right: -60px; bottom: -60px; width: 220px; height: 220px; border: 3px dashed var(--teal); border-radius: 50%; opacity: 0.35; pointer-events: none; }\n.cw-banner h3 { color: var(--teal-soft); margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 600; }\n.cw-banner .cw-num { font-size: 36px; font-weight: 600; line-height: 1; margin-top: 4px; letter-spacing: -0.02em; }\n.cw-banner .cw-dates { font-size: 13px; opacity: 0.7; margin-top: 4px; font-weight: 300; }\n.cw-banner .cw-actions { display: flex; gap: 8px; flex-wrap: wrap; position: relative; z-index: 1; }\n.cw-banner .btn { background: transparent; border-color: rgba(255,255,255,0.4); color: white; }\n.cw-banner .btn:hover { background: rgba(255,255,255,0.1); border-color: white; }\n.cw-banner .btn.primary { background: var(--teal); color: white; border-color: var(--teal); }\n.cw-banner .btn.primary:hover { background: var(--teal-bright); border-color: var(--teal-bright); }\n\n/* QR scan related */\n.qr-reader { width: 100%; max-width: 420px; margin: 0 auto; }\n.qr-reader video { width: 100% !important; border-radius: var(--radius); }\n.qr-step { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); background: var(--bg-alt); margin-bottom: 8px; border: 1px solid var(--border); }\n.qr-step.active { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal); font-weight: 500; }\n.qr-step.done { background: var(--green-light); color: var(--green); border-color: var(--green); }\n.qr-step .num { font-size: 16px; font-weight: 600; width: 28px; height: 28px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid currentColor; }\n.qr-step.done .num::after { content: '\\2713'; }\n.qr-step.done .num { color: var(--green); font-size: 0; }\n.qr-step.done .num::after { font-size: 16px; }\n.qr-code-box { display: flex; flex-direction: column; align-items: center; padding: 12px; background: white; border: 1px solid var(--border); border-radius: var(--radius); }\n.qr-code-box canvas, .qr-code-box img { display: block; }\n.qr-code-box .cap { font-size: 12px; color: var(--grey-500); margin-top: 8px; font-family: monospace; }\n.photo-label { font-size: 11px; color: var(--grey-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; margin-bottom: 2px; font-weight: 600; }\n.photo-side-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }\n.photo-side { aspect-ratio: 4/3; background: var(--grey-100); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }\n.photo-side img { width: 100%; height: 100%; object-fit: cover; display: block; }\n.photo-side .side-label { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; }\n.photo-side.empty { color: var(--grey-500); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; text-align: center; padding: 8px; }\n\n/* Task checklist — leesbaar op werkvloer */\n.task-checklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }\n.task-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; background: white; min-height: 56px; transition: background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease); }\n.task-row:hover { background: var(--bg-alt); border-color: var(--grey-300); }\n.task-row input[type=\"checkbox\"] { width: 22px; height: 22px; flex-shrink: 0; margin: 0; cursor: pointer; accent-color: var(--teal); }\n.task-row .task-text { font-size: 16px; line-height: 1.4; color: var(--text); flex: 1; word-break: break-word; font-weight: 400; }\n.task-row.done { background: var(--green-light); border-color: var(--green); }\n.task-row.done .task-text { text-decoration: line-through; color: var(--grey-500); }\n\n/* Mobile-first */\n@media (max-width: 700px) {\n  html, body { font-size: 16px; }\n  .top { padding: 10px 14px; }\n  .top h1 { font-size: 16px; }\n  .top h1 .tag { display: none; }\n  .top-actions { gap: 6px; }\n  .week-pill { padding: 6px 10px; font-size: 13px; }\n  .crumbs { padding: 8px 14px; font-size: 13px; }\n  .main { padding: 14px; }\n  h2 { font-size: 20px; }\n  .btn { padding: 12px 16px; font-size: 15px; min-height: 44px; }\n  .btn.sm { padding: 8px 12px; font-size: 14px; min-height: 36px; }\n  .btn.lg { padding: 16px 22px; font-size: 17px; }\n  .card { padding: 14px; }\n  .card-title { font-size: 17px; }\n  .card-sub { font-size: 14px; }\n  .field input, .field textarea, .field select { padding: 12px 14px; font-size: 16px; min-height: 44px; }\n  .panels { gap: 10px; }\n  .panel { padding: 14px; }\n  .pct-btn { padding: 16px 4px; font-size: 17px; min-height: 56px; }\n  .photo-upload { padding: 18px; font-size: 15px; }\n  .modal { padding: 16px; max-width: 95vw; }\n  .cw-banner { padding: 12px 14px; }\n  .cw-banner .cw-num { font-size: 22px; }\n  .qr-step { padding: 14px 16px; min-height: 56px; }\n  .qr-step .num { width: 32px; height: 32px; font-size: 18px; }\n  .task-row { padding: 14px 16px; min-height: 60px; }\n  .task-row .task-text { font-size: 17px; }\n  .task-row input[type=\"checkbox\"] { width: 28px; height: 28px; }\n  .photo-side-row { grid-template-columns: 1fr; gap: 8px; }\n}\n\n/* PWA standalone mode (homescreen icon launch op Android tablets) */\n@media all and (display-mode: standalone) {\n  body { background: var(--teal-dark); }\n  .app {\n    min-height: 100vh;\n    min-height: 100dvh;\n  }\n}\n\n/* In-app PWA install / update banner (rendered via JS, styled here) */\n.pwa-banner {\n  position: fixed;\n  left: 12px; right: 12px; bottom: 12px;\n  background: var(--gpi-black);\n  color: white;\n  border-radius: var(--radius);\n  border-left: 3px solid var(--teal);\n  padding: 14px 18px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  box-shadow: var(--shadow-md);\n  z-index: 9999;\n  font-size: 14px;\n}\n.pwa-banner button {\n  background: var(--teal);\n  color: white;\n  border: none;\n  padding: 9px 16px;\n  border-radius: var(--radius);\n  font-weight: 600;\n  cursor: pointer;\n  font-size: 13px;\n  letter-spacing: 0.02em;\n}\n.pwa-banner .pwa-close {\n  background: transparent;\n  color: white;\n  font-size: 18px;\n  padding: 4px 8px;\n  font-weight: normal;\n}\n\n/* JSON import preview modal helpers */\n.json-preview-row {\n  display: flex;\n  justify-content: space-between;\n  padding: 10px 0;\n  border-bottom: 1px solid var(--grey-200);\n  font-size: 14px;\n}\n.json-preview-row:last-child { border-bottom: none; }\n.json-preview-row .lbl { color: var(--grey-500); font-weight: 400; }\n.json-preview-row .val { font-weight: 600; color: var(--gpi-black); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\" id=\"app\"><\u002Fdiv>\n\n<script>\n// ------------------------------------------------------------------\n// FloorScan Pilot — Gpi Tanks v2.4 (PWA-enabled, Android-only)\n// Single-file HTML app: localStorage + auto-sync (FSA) op desktop,\n// classic upload/download fallback voor Android tablet,\n// Excel-import (2-row header parser), QR-scan, in-app camera,\n// huidige week altijd zichtbaar, weekdoel als afvinkbare checklist.\n//\n// v2.4 voegt toe (zonder bestaande logica te wijzigen):\n//  - Service worker + manifest → installeerbaar op Android Chrome/Edge, offline-shell\n//  - Web Share API + auto-naam in JSON-export (Android OS-deelmenu)\n//  - Soepelere accept-types + foutafhandeling in JSON-import\n//  - Validatie + preview-modal voor import (vervang of merge)\n// Doel-platform: Android tablets (Chrome/Edge) + Windows desktop (Chrome/Edge).\n// ------------------------------------------------------------------\nconst FLOORSCAN_VERSION = 'v2.4.4';\n\nconst STORAGE_KEY = 'floorscan_v2';\nconst USER_KEY = 'floorscan_user';\nconst IDB_NAME = 'floorscan_db';\nconst IDB_STORE = 'settings';\nconst IDB_HANDLE_KEY = 'sharedHandle';\nconst IDB_EXCEL_KEY = 'excelHandle';\nconst POLL_INTERVAL = 5000;\nconst WRITE_DEBOUNCE = 600;\nconst SELF_WRITE_GRACE = 3500;\nconst PART_TO_ZONE = { TB: 'TB', M: 'Hal M', L: 'Hal L', ISO: 'ISO', PREP: 'PREP' };\n\n// ---------- State ----------\nlet state = {\n  projects: [],\n  _meta: {},\n  view: 'home',\n  projectId: null,\n  werkbonId: null,\n  weekId: null,\n  modal: null,\n};\n\n// ---------- File sync (File System Access API) ----------\nlet fileHandle = null;\nlet pendingHandle = null;\nlet lastKnownModified = 0;\nlet lastWriteStamp = 0;\nlet writeTimer = null;\nlet pollingTimer = null;\nlet syncStatus = 'off'; // 'off' | 'ok' | 'warn'\n\n// Excel-koppeling (Productionplans Lopik.xlsx)\nlet excelHandle = null;\nlet excelPendingHandle = null;\n\nfunction fsaSupported() { return 'showOpenFilePicker' in window && 'showSaveFilePicker' in window; }\n\nfunction idbOpen() {\n  return new Promise((resolve, reject) => {\n    const req = indexedDB.open(IDB_NAME, 1);\n    req.onupgradeneeded = e => { e.target.result.createObjectStore(IDB_STORE); };\n    req.onsuccess = e => resolve(e.target.result);\n    req.onerror = e => reject(e.target.error);\n  });\n}\nasync function idbGet(key) {\n  const db = await idbOpen();\n  return new Promise((resolve, reject) => {\n    const tx = db.transaction(IDB_STORE, 'readonly');\n    const req = tx.objectStore(IDB_STORE).get(key);\n    req.onsuccess = () => resolve(req.result);\n    req.onerror = () => reject(req.error);\n  });\n}\nasync function idbSet(key, value) {\n  const db = await idbOpen();\n  return new Promise((resolve, reject) => {\n    const tx = db.transaction(IDB_STORE, 'readwrite');\n    tx.objectStore(IDB_STORE).put(value, key);\n    tx.oncomplete = () => resolve();\n    tx.onerror = () => reject(tx.error);\n  });\n}\nasync function idbDel(key) {\n  const db = await idbOpen();\n  return new Promise((resolve, reject) => {\n    const tx = db.transaction(IDB_STORE, 'readwrite');\n    tx.objectStore(IDB_STORE).delete(key);\n    tx.oncomplete = () => resolve();\n    tx.onerror = () => reject(tx.error);\n  });\n}\n\nfunction getUsername() { return localStorage.getItem(USER_KEY) || ''; }\nfunction setUsername(n) { localStorage.setItem(USER_KEY, n); }\n\nasync function connectSharedFile(mode) {\n  if (!fsaSupported()) {\n    alert('Gedeelde opslag werkt alleen in Chrome of Edge (desktop of Android).');\n    return;\n  }\n  try {\n    let h;\n    if (mode === 'new') {\n      h = await window.showSaveFilePicker({\n        suggestedName: 'floorscan_data.json',\n        types: [{ description: 'FloorScan data', accept: { 'application/json': ['.json'] } }]\n      });\n      fileHandle = h;\n      await writeToFile(true);\n      await idbSet(IDB_HANDLE_KEY, h);\n      startPolling();\n      setSync('ok');\n      toast('Nieuw bestand aangemaakt: ' + h.name);\n    } else {\n      const picked = await window.showOpenFilePicker({\n        types: [{ description: 'FloorScan data', accept: { 'application/json': ['.json'] } }]\n      });\n      h = picked[0];\n      fileHandle = h;\n      const imported = await readFromFile();\n      if (imported) {\n        if (state.projects.length) toast('Gedeelde data geladen van ' + h.name);\n      } else {\n        await writeToFile(true);\n        toast('Gekoppeld en huidige data weggeschreven');\n      }\n      await idbSet(IDB_HANDLE_KEY, h);\n      startPolling();\n      setSync('ok');\n      render();\n    }\n  } catch (e) {\n    if (e.name !== 'AbortError') alert('Koppelen mislukt: ' + e.message);\n  }\n}\n\nasync function disconnectSharedFile() {\n  if (!confirm('Koppeling met gedeeld bestand opheffen? Data blijft lokaal bewaard.')) return;\n  fileHandle = null;\n  pendingHandle = null;\n  if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }\n  await idbDel(IDB_HANDLE_KEY);\n  setSync('off');\n  render();\n  toast('Ontkoppeld');\n}\n\nasync function tryRestoreHandle() {\n  if (!fsaSupported()) return;\n  try {\n    const h = await idbGet(IDB_HANDLE_KEY);\n    if (!h) return;\n    const perm = await h.queryPermission({ mode: 'readwrite' });\n    if (perm === 'granted') {\n      fileHandle = h;\n      await readFromFile();\n      startPolling();\n      setSync('ok');\n    } else {\n      pendingHandle = h;\n      setSync('warn');\n    }\n  } catch (e) { /* handle weg of ongeldig */ }\n}\n\nasync function reactivateHandle() {\n  if (!pendingHandle) return;\n  try {\n    const perm = await pendingHandle.requestPermission({ mode: 'readwrite' });\n    if (perm === 'granted') {\n      fileHandle = pendingHandle;\n      pendingHandle = null;\n      await readFromFile();\n      startPolling();\n      setSync('ok');\n      render();\n      toast('Heractiveerd');\n    } else {\n      alert('Toestemming geweigerd');\n    }\n  } catch (e) { alert('Heractiveren mislukt: ' + e.message); }\n}\n\nasync function readFromFile() {\n  if (!fileHandle) return false;\n  const file = await fileHandle.getFile();\n  lastKnownModified = file.lastModified;\n  const text = await file.text();\n  if (!text.trim()) return false;\n  try {\n    const parsed = JSON.parse(text);\n    if (parsed && Array.isArray(parsed.projects)) {\n      state.projects = parsed.projects;\n      state._meta = parsed._meta || {};\n      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: state.projects, _meta: state._meta })); } catch (e) {}\n      return true;\n    }\n  } catch (e) { console.error('Parse mislukt', e); }\n  return false;\n}\n\nasync function writeToFile(force = false) {\n  if (!fileHandle) return;\n  try {\n    state._meta = state._meta || {};\n    state._meta.lastModifiedBy = getUsername() || 'onbekend';\n    state._meta.lastModifiedAt = new Date().toISOString();\n    state._meta.version = (state._meta.version || 0) + 1;\n    const payload = { projects: state.projects, _meta: state._meta };\n    const stream = await fileHandle.createWritable();\n    await stream.write(JSON.stringify(payload, null, 2));\n    await stream.close();\n    const file = await fileHandle.getFile();\n    lastKnownModified = file.lastModified;\n    lastWriteStamp = Date.now();\n    setSync('ok');\n  } catch (e) {\n    console.error('Schrijven mislukt', e);\n    setSync('warn');\n    toast('Schrijven naar bestand mislukt — check koppeling');\n  }\n}\n\nfunction startPolling() {\n  if (pollingTimer) clearInterval(pollingTimer);\n  pollingTimer = setInterval(async () => {\n    if (!fileHandle) return;\n    try {\n      const file = await fileHandle.getFile();\n      const sinceSelfWrite = Date.now() - lastWriteStamp;\n      if (file.lastModified > lastKnownModified && sinceSelfWrite > SELF_WRITE_GRACE) {\n        const before = JSON.stringify(state.projects);\n        await readFromFile();\n        const after = JSON.stringify(state.projects);\n        if (before !== after) {\n          const by = state._meta && state._meta.lastModifiedBy ? state._meta.lastModifiedBy : 'ander apparaat';\n          toast('Bijgewerkt door ' + by);\n          render();\n        }\n      }\n    } catch (e) {\n      setSync('warn');\n    }\n  }, POLL_INTERVAL);\n}\n\nfunction setSync(s) {\n  syncStatus = s;\n  const existing = document.querySelector('.top');\n  if (existing) existing.replaceWith(renderTop());\n}\n\n// ---------- Excel import (Productionplans Lopik.xlsx) ----------\n\n// MOBIELE FALLBACK: leest een Excel via klassieke <input>, parst eenmalig zonder live-link.\n// Werkt op Android Chrome/Edge en desktop Chrome/Edge — gebruikt geen FSA.\nfunction importExcelViaPlainInput() {\n  if (typeof XLSX === 'undefined') {\n    alert('SheetJS niet geladen — ververs de pagina met internetverbinding.');\n    return;\n  }\n  const inp = document.createElement('input');\n  inp.type = 'file';\n  inp.setAttribute('accept', '.xlsx,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');\n  inp.style.position = 'fixed'; inp.style.left = '-9999px';\n  inp.onchange = async e => {\n    const f = e.target.files && e.target.files[0];\n    inp.remove();\n    if (!f) return;\n    let workbook;\n    try {\n      const buf = await f.arrayBuffer();\n      workbook = XLSX.read(buf, { type: 'array', cellDates: true });\n    } catch (err) {\n      alert('Excel lezen mislukt: ' + err.message);\n      return;\n    }\n    const parsed = parseProductionplansWorkbook(workbook);\n    if (!parsed.orders.length) { showExcelDiagnoseModal(workbook, parsed); return; }\n    showExcelPreviewModal(parsed);\n  };\n  document.body.appendChild(inp);\n  inp.click();\n}\n\n// MOBIELE FALLBACK: deel/download de huidige state als JSON.\n// v2.4: probeert eerst Web Share API (Android OS-deelmenu naar Files/Drive/Mail),\n// valt terug op klassieke download via <a> op desktop.\nfunction downloadDataAsFile() {\n  const payload = { projects: state.projects, _meta: state._meta || {} };\n  // Voeg lichte metadata toe voor latere import-validatie (achterwaarts compatibel)\n  payload._export = {\n    app: 'FloorScan',\n    version: typeof FLOORSCAN_VERSION === 'string' ? FLOORSCAN_VERSION : 'v2.4',\n    exported_at: new Date().toISOString(),\n    user: getUsername() || null,\n    project_count: state.projects.length\n  };\n  const json = JSON.stringify(payload, null, 2);\n  const blob = new Blob([json], { type: 'application/json' });\n  const filename = buildExportFilename(state.projects.length);\n\n  // 1) Probeer Web Share API met file (Android beste UX → Files / Drive / Mail / WhatsApp)\n  if (navigator.canShare && typeof File !== 'undefined') {\n    try {\n      const file = new File([blob], filename, { type: 'application/json' });\n      if (navigator.canShare({ files: [file] })) {\n        navigator.share({\n          files: [file],\n          title: 'FloorScan export',\n          text: filename\n        }).then(() => {\n          toast(state.projects.length + ' projecten gedeeld');\n        }).catch(err => {\n          // AbortError = user annuleerde share-dialoog → géén fallback nodig\n          if (err && err.name === 'AbortError') return;\n          console.warn('[FloorScan] Web Share mislukt, fallback download:', err);\n          fallbackDownload(blob, filename);\n        });\n        return;\n      }\n    } catch (e) {\n      console.warn('[FloorScan] Web Share niet bruikbaar, fallback download:', e);\n    }\n  }\n\n  // 2) Fallback: klassieke download\n  fallbackDownload(blob, filename);\n}\n\nfunction fallbackDownload(blob, filename) {\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = filename;\n  document.body.appendChild(a); a.click(); a.remove();\n  setTimeout(() => URL.revokeObjectURL(url), 5000);\n  toast(state.projects.length + ' projecten geëxporteerd');\n}\n\nfunction buildExportFilename(projectCount) {\n  const d = new Date();\n  const pad = n => String(n).padStart(2, '0');\n  const stamp = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +\n                '-' + pad(d.getHours()) + pad(d.getMinutes());\n  const cnt = projectCount != null ? '-' + projectCount + 'proj' : '';\n  return 'floorscan-' + stamp + cnt + '.json';\n}\n\n// MOBIELE FALLBACK: laad een gekozen JSON-bestand in (vervangt of merge'd state).\n// v2.4: soepele accept-types voor Android file pickers, validatie + preview-modal,\n// merge/vervang keuze in modal (defaultMode komt uit caller).\nfunction loadDataFromFile(merge) {\n  const defaultMode = merge ? 'merge' : 'replace';\n  const inp = document.createElement('input');\n  inp.type = 'file';\n  // Meerdere accept-types: sommige Android file pickers (Samsung, Files by Google)\n  // filteren strikt op extension; text/plain en text/json als extra hint.\n  inp.setAttribute('accept', 'application/json,.json,text/json,text/plain');\n  inp.style.position = 'fixed'; inp.style.left = '-9999px';\n  inp.onchange = async e => {\n    const f = e.target.files && e.target.files[0];\n    inp.remove();\n    if (!f) return;\n    await processIncomingFile(f, defaultMode);\n  };\n  document.body.appendChild(inp);\n  inp.click();\n}\n\n// Geparametriseerde import-pipeline: gebruikt door file-picker, share-target én file_handlers.\n// Accepteert óf een File-object, óf een plain object {name, type, size, content}\n// (zoals opgeslagen door de service worker).\nasync function processIncomingFile(input, defaultMode) {\n  let name = '?', size = 0, type = '', txt = '';\n\n  if (input && typeof input === 'object' && 'content' in input && typeof input.content === 'string') {\n    // Object uit IndexedDB-inbox (share-target)\n    name = input.name || 'shared.json';\n    size = input.size || (input.content.length);\n    type = input.type || 'application/json';\n    txt = input.content;\n  } else if (input && typeof input.text === 'function') {\n    // File of Blob\n    name = input.name || 'shared.json';\n    size = input.size || 0;\n    type = input.type || '';\n    if (size > 50 * 1024 * 1024) {\n      alert('Bestand is groter dan 50 MB — onwaarschijnlijk een FloorScan-export.');\n      return;\n    }\n    try {\n      txt = await input.text();\n    } catch (err) {\n      alert('Kon bestand niet lezen: ' + err.message);\n      return;\n    }\n  } else {\n    alert('Onverwacht bestandstype ontvangen.');\n    return;\n  }\n\n  // Heuristiek: detect binaire content (bv. OneDrive-placeholder MSMAMARPC,\n  // Office-encrypted blobs, etc.) — geef dan een gerichte fout in plaats van\n  // de cryptische JSON.parse-error.\n  if (looksLikeBinary(txt)) {\n    alert('Dit bestand bevat geen tekst maar binaire data — vrijwel zeker een ' +\n          'OneDrive-placeholder of een door OneDrive geblokkeerd/versleuteld bestand.\\n\\n' +\n          'Probeer dit:\\n' +\n          '1. Open de OneDrive-app en maak het bestand offline beschikbaar\\n' +\n          '   (long-press → \"Beschikbaar maken op apparaat\")\\n' +\n          '2. Of: e-mail het bestand naar jezelf, sla op als bijlage, en upload daarvan.\\n' +\n          '3. Of: deel het JSON-bestand vanuit OneDrive naar FloorScan via \"Delen → FloorScan\".\\n\\n' +\n          'Gekozen: ' + name);\n    return;\n  }\n\n  let parsed;\n  try {\n    parsed = JSON.parse(txt);\n  } catch (err) {\n    alert('Geen geldig JSON-bestand.\\n\\n' +\n          'Tip: kies een bestand met de naam \"floorscan-...\" en de extensie .json.\\n' +\n          'Gekozen: ' + name +\n          '\\n\\nFout: ' + err.message);\n    return;\n  }\n\n  if (!parsed || typeof parsed !== 'object') {\n    alert('Bestand bevat geen geldig FloorScan-object.');\n    return;\n  }\n  if (!Array.isArray(parsed.projects)) {\n    alert('Bestand mist het verwachte \"projects\"-veld. Mogelijk verkeerd bestand?\\n\\n' +\n          'Gekozen: ' + name);\n    return;\n  }\n\n  const stats = computeImportStats(parsed);\n  // Faux-File voor de preview-modal (heeft alleen name + size nodig)\n  const fileLike = { name, size };\n  showImportPreviewModal(parsed, stats, fileLike, defaultMode || 'merge');\n}\n\n// Detecteer of de eerste 200 chars veel non-printable bytes bevatten —\n// indicatie van binaire content (OneDrive-placeholder, IRM-encrypted, etc.).\nfunction looksLikeBinary(text) {\n  if (!text || text.length === 0) return false;\n  const sample = text.slice(0, 200);\n  let nonPrintable = 0;\n  for (let i = 0; i < sample.length; i++) {\n    const c = sample.charCodeAt(i);\n    // Tab (9), LF (10), CR (13) zijn legaal. Alles 0-8, 11-12, 14-31, 127 = control char.\n    if (c < 9 || (c > 13 && c < 32) || c === 127) nonPrintable++;\n    // Ook null bytes en MSMAMARPC-achtige headers vlaggen\n    if (c === 0) return true;\n  }\n  return (nonPrintable / sample.length) > 0.05;\n}\n\n// Bereken samenvattende cijfers van een te-importeren payload\nfunction computeImportStats(parsed) {\n  let werkbonCount = 0, weekCount = 0, photoCount = 0, taskDoneCount = 0;\n  let exportedAt = null, exportedBy = null, exportVersion = null;\n  (parsed.projects || []).forEach(p => {\n    (p.werkbonnen || []).forEach(w => {\n      werkbonCount++;\n      (w.weeks || []).forEach(wk => {\n        weekCount++;\n        if (wk.photos && wk.photos.length) photoCount += wk.photos.length;\n        if (wk.tasks_done && typeof wk.tasks_done === 'object') {\n          taskDoneCount += Object.values(wk.tasks_done).filter(Boolean).length;\n        }\n      });\n    });\n  });\n  if (parsed._export) {\n    exportedAt = parsed._export.exported_at || null;\n    exportedBy = parsed._export.user || null;\n    exportVersion = parsed._export.version || null;\n  }\n  return {\n    projectCount: parsed.projects.length,\n    werkbonCount,\n    weekCount,\n    photoCount,\n    taskDoneCount,\n    exportedAt,\n    exportedBy,\n    exportVersion\n  };\n}\n\n// Toon de import-preview met conflict-info en knoppen voor Vervangen/Samenvoegen\nfunction showImportPreviewModal(parsed, stats, file, defaultMode) {\n  const currentCount = state.projects.length;\n  const currentNumbers = new Set(state.projects.map(p => String(p.number)));\n  const importNumbers = parsed.projects.map(p => String(p.number));\n  const conflicts = importNumbers.filter(n => currentNumbers.has(n));\n  const newOnes = importNumbers.filter(n => !currentNumbers.has(n));\n\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'Bevestig import'));\n      m.appendChild(el('p', { style: 'font-size: 13px; color: var(--grey-500); margin-top: 0;' },\n        'Bestand: ', el('b', {}, file.name || '(onbekend)'),\n        ' · ', formatBytes(file.size)));\n\n      // Statistieken-blok\n      const statsBox = el('div', { style: 'background: var(--grey-50); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0;' });\n      statsBox.appendChild(previewRow('Projecten in bestand', String(stats.projectCount)));\n      statsBox.appendChild(previewRow('Werkbonnen', String(stats.werkbonCount)));\n      statsBox.appendChild(previewRow('Weken met data', String(stats.weekCount)));\n      statsBox.appendChild(previewRow('Foto\\'s', String(stats.photoCount)));\n      statsBox.appendChild(previewRow('Afgevinkte taken', String(stats.taskDoneCount)));\n      if (stats.exportedAt) {\n        const dt = new Date(stats.exportedAt);\n        const human = isNaN(dt.getTime()) ? stats.exportedAt :\n          dt.toLocaleString('nl-NL', { dateStyle: 'short', timeStyle: 'short' });\n        statsBox.appendChild(previewRow('Geëxporteerd op', human));\n      }\n      if (stats.exportedBy) statsBox.appendChild(previewRow('Door', stats.exportedBy));\n      if (stats.exportVersion) statsBox.appendChild(previewRow('App-versie', stats.exportVersion));\n      m.appendChild(statsBox);\n\n      // Conflict-info t.o.v. huidige state\n      const conflictBox = el('div', { style: 'background: var(--teal-light); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px; font-size: 13px;' });\n      conflictBox.appendChild(el('div', {},\n        el('b', {}, 'Huidig: '), currentCount + ' projecten op dit apparaat.'));\n      if (conflicts.length) {\n        conflictBox.appendChild(el('div', { style: 'margin-top: 4px;' },\n          el('b', {}, conflicts.length + ' conflicterend'),\n          ': ' + conflicts.slice(0, 6).join(', ') + (conflicts.length > 6 ? ', …' : '')));\n      }\n      if (newOnes.length) {\n        conflictBox.appendChild(el('div', { style: 'margin-top: 4px;' },\n          el('b', {}, newOnes.length + ' nieuw'),\n          ': ' + newOnes.slice(0, 6).join(', ') + (newOnes.length > 6 ? ', …' : '')));\n      }\n      m.appendChild(conflictBox);\n\n      // Mode-keuze\n      m.appendChild(el('div', { style: 'font-size: 13px; color: var(--grey-700); margin-bottom: 8px;' },\n        'Hoe wil je deze data toevoegen?'));\n\n      const explainReplace = el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-top: 6px; line-height: 1.4;' },\n        '• ', el('b', {}, 'Vervangen'), ': huidige data wordt overschreven door bestand. ' +\n        (currentCount > 0 ? 'Foto\\'s en voortgang die alleen op dit apparaat staan gaan verloren.' : 'Geen risico — apparaat is leeg.'));\n      const explainMerge = el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-top: 6px; line-height: 1.4;' },\n        '• ', el('b', {}, 'Samenvoegen'), ': bestand wordt over huidige data gelegd. ' +\n        'Foto\\'s die al lokaal stonden blijven behouden, ook bij conflicten. Werkbon-structuur volgt het bestand.');\n      m.appendChild(explainReplace);\n      m.appendChild(explainMerge);\n\n      // Knoppen\n      const actions = el('div', { class: 'actions', style: 'margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px;' });\n      actions.appendChild(el('button', { class: 'btn', onClick: closeModal }, 'Annuleer'));\n      const replaceBtn = el('button', {\n        class: defaultMode === 'replace' ? 'btn primary' : 'btn',\n        onClick: () => { closeModal(); doImport(parsed, false); }\n      }, '↻ Vervangen (' + currentCount + ' → ' + stats.projectCount + ')');\n      const mergeBtn = el('button', {\n        class: defaultMode === 'merge' ? 'btn primary' : 'btn',\n        onClick: () => { closeModal(); doImport(parsed, true); }\n      }, '⊕ Samenvoegen');\n      // Volgorde: standaardkeuze rechts (laatste = primary)\n      if (defaultMode === 'merge') {\n        actions.appendChild(replaceBtn);\n        actions.appendChild(mergeBtn);\n      } else {\n        actions.appendChild(mergeBtn);\n        actions.appendChild(replaceBtn);\n      }\n      m.appendChild(actions);\n    }\n  };\n  render();\n}\n\nfunction previewRow(label, value) {\n  return el('div', { class: 'json-preview-row' },\n    el('span', { class: 'lbl' }, label),\n    el('span', { class: 'val' }, value));\n}\n\nfunction formatBytes(n) {\n  if (n == null) return '?';\n  if (n < 1024) return n + ' B';\n  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';\n  return (n / (1024 * 1024)).toFixed(2) + ' MB';\n}\n\n// De daadwerkelijke import-logica (bestaande gedrag, geïsoleerd uit picker-flow)\nfunction doImport(parsed, merge) {\n  try {\n    if (merge) {\n      const existing = new Map(state.projects.map(p => [String(p.number), p]));\n      let added = 0, replaced = 0;\n      parsed.projects.forEach(np => {\n        const ex = existing.get(String(np.number));\n        if (ex) {\n          // Behoud foto's per werkbon/week, neem rest uit nieuwe\n          const oldByKey = new Map();\n          (ex.werkbonnen || []).forEach(w => oldByKey.set(String(w.excel_key || w.number), w));\n          (np.werkbonnen || []).forEach(nw => {\n            const ow = oldByKey.get(String(nw.excel_key || nw.number));\n            if (ow) {\n              // Per-week samenvoegen\n              const owWeeks = new Map((ow.weeks || []).map(w => [w.week, w]));\n              (nw.weeks || []).forEach(w => {\n                const o = owWeeks.get(w.week);\n                if (o) {\n                  if (o.photos && o.photos.length) w.photos = o.photos;\n                  if (o.sides) w.sides = o.sides;\n                  if (o.confirmed_pct != null) w.confirmed_pct = o.confirmed_pct;\n                  if (o.remark) w.remark = o.remark;\n                  if (o.tasks_done && Object.keys(o.tasks_done).length) w.tasks_done = o.tasks_done;\n                }\n              });\n            }\n          });\n          // Vervang werkbonnen door nieuwe (met behoud van photos via bovenstaand)\n          ex.werkbonnen = np.werkbonnen;\n          replaced++;\n        } else {\n          state.projects.push(np);\n          added++;\n        }\n      });\n      save(); render();\n      toast('Merge: +' + added + ' nieuwe, ' + replaced + ' bijgewerkt');\n    } else {\n      state.projects = parsed.projects;\n      state._meta = parsed._meta || {};\n      save(); render();\n      toast('Geladen: ' + state.projects.length + ' projecten');\n    }\n  } catch (err) {\n    alert('Import mislukt: ' + err.message);\n  }\n}\n\nasync function connectExcelFile() {\n  if (!fsaSupported()) {\n    alert('Excel koppelen werkt alleen in Chrome of Edge.');\n    return;\n  }\n  if (typeof XLSX === 'undefined') {\n    alert('Excel-bibliotheek kon niet laden (check internetverbinding).');\n    return;\n  }\n  try {\n    const picked = await window.showOpenFilePicker({\n      types: [{ description: 'Excel bouwplan', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx', '.xlsm'] } }]\n    });\n    excelHandle = picked[0];\n    await idbSet(IDB_EXCEL_KEY, excelHandle);\n    toast('Excel gekoppeld: ' + excelHandle.name);\n    await importFromExcel({ autoConfirm: false });\n  } catch (e) {\n    if (e.name !== 'AbortError') alert('Excel koppelen mislukt: ' + e.message);\n  }\n}\n\nasync function disconnectExcelFile() {\n  if (!confirm('Excel-koppeling opheffen? Ingeladen werkbonnen blijven bewaard.')) return;\n  excelHandle = null;\n  excelPendingHandle = null;\n  await idbDel(IDB_EXCEL_KEY);\n  render();\n  toast('Excel ontkoppeld');\n}\n\nasync function tryRestoreExcelHandle() {\n  if (!fsaSupported()) return;\n  try {\n    const h = await idbGet(IDB_EXCEL_KEY);\n    if (!h) return;\n    const perm = await h.queryPermission({ mode: 'read' });\n    if (perm === 'granted') {\n      excelHandle = h;\n    } else {\n      excelPendingHandle = h;\n    }\n  } catch (e) { /* handle weg */ }\n}\n\nasync function reactivateExcelHandle() {\n  if (!excelPendingHandle) return false;\n  try {\n    const perm = await excelPendingHandle.requestPermission({ mode: 'read' });\n    if (perm === 'granted') {\n      excelHandle = excelPendingHandle;\n      excelPendingHandle = null;\n      return true;\n    }\n  } catch (e) {}\n  return false;\n}\n\nasync function importFromExcel(opts = {}) {\n  if (!excelHandle) {\n    if (excelPendingHandle) {\n      const ok = await reactivateExcelHandle();\n      if (!ok) { alert('Geen toegang tot Excel-bestand.'); return; }\n    } else {\n      await connectExcelFile();\n      return;\n    }\n  }\n  if (typeof XLSX === 'undefined') {\n    alert('SheetJS niet geladen — open het bestand eerst met internetverbinding.');\n    return;\n  }\n  let workbook;\n  try {\n    const file = await excelHandle.getFile();\n    const buf = await file.arrayBuffer();\n    workbook = XLSX.read(buf, { type: 'array', cellDates: true });\n  } catch (e) {\n    alert('Excel lezen mislukt: ' + e.message);\n    return;\n  }\n  const parsed = parseProductionplansWorkbook(workbook);\n  if (!parsed.orders.length) {\n    showExcelDiagnoseModal(workbook, parsed);\n    return;\n  }\n  if (!opts.autoConfirm) {\n    showExcelPreviewModal(parsed);\n  } else {\n    applyExcelImport(parsed);\n  }\n}\n\nfunction parseProductionplansWorkbook(wb) {\n  const result = { orders: [], sheetName: '', headerRow: -1, weeksFound: [] };\n  let best = null;\n  for (const sheetName of wb.SheetNames) {\n    const ws = wb.Sheets[sheetName];\n    if (!ws) continue;\n    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });\n    const parsed = tryParseSheet(rows);\n    if (parsed && parsed.orders.length > (best ? best.orders.length : 0)) {\n      best = { ...parsed, sheetName };\n    }\n  }\n  if (best) {\n    result.orders = best.orders;\n    result.sheetName = best.sheetName;\n    result.headerRow = best.headerRow;\n    result.weeksFound = best.weeksFound;\n  }\n  return result;\n}\n\nfunction tryParseSheet(rows) {\n  // Productionplans Lopik gebruikt een 2-rijen header:\n  //   rij 1: Order | SO | Week number | (leeg) | Week 3 | (merged) ... | Week 4 | ...\n  //   rij 2:                | Location | Part | Task | Status | VC Hours | Estimated | Planning | Task | ...\n  if (!rows || rows.length < 3) return null;\n  return parseTwoRowHeader(rows);\n}\n\nfunction parseTwoRowHeader(rows) {\n  // Zoek de 2-rijen header in de eerste 30 rijen\n  let h1 = -1;\n  for (let r = 0; r < Math.min(rows.length - 1, 30); r++) {\n    const r1 = (rows[r] || []).map(c => String(c || '').toLowerCase().trim());\n    const r2 = (rows[r + 1] || []).map(c => String(c || '').toLowerCase().trim());\n    const r1HasOrder = r1.some(t => t === 'order');\n    const r2HasPart = r2.some(t => t === 'part' || t === 'onderdeel');\n    if (r1HasOrder && r2HasPart) { h1 = r; break; }\n  }\n  if (h1 < 0) return null;\n  const headerRow = h1, secondHeaderRow = h1 + 1;\n  const r1raw = rows[h1] || [];\n  const r2raw = rows[h1 + 1] || [];\n  const maxCols = Math.max(r1raw.length, r2raw.length);\n\n  // Forward-fill rij 1 (voor merged Week-labels)\n  const r1ff = [];\n  let last = '';\n  for (let c = 0; c < maxCols; c++) {\n    const v = String(r1raw[c] || '').trim();\n    if (v) last = v;\n    r1ff.push(last);\n  }\n\n  // Base-kolommen\n  let orderCol = -1, soCol = -1, locCol = -1, partCol = -1;\n  for (let c = 0; c < maxCols; c++) {\n    const top = String(r1raw[c] || '').toLowerCase().trim();\n    const sub = String(r2raw[c] || '').toLowerCase().trim();\n    if (top === 'order' && orderCol < 0) orderCol = c;\n    if (top === 'so' && soCol < 0) soCol = c;\n    if ((sub === 'location' || sub === 'locatie') && locCol < 0) locCol = c;\n    if ((sub === 'part' || sub === 'onderdeel') && partCol < 0) partCol = c;\n  }\n  if (orderCol < 0 || partCol < 0) return null;\n\n  // Week-kolommen (5 sub-kols per week onder de \"Week N\" header)\n  const weekCols = {};\n  for (let c = 0; c < maxCols; c++) {\n    const top = String(r1ff[c] || '').trim();\n    const sub = String(r2raw[c] || '').toLowerCase().trim();\n    const m = top.match(/^week\\s*(\\d{1,2})$/i);\n    if (!m) continue;\n    const wk = parseInt(m[1]);\n    if (wk < 1 || wk > 53) continue;\n    if (!weekCols[wk]) weekCols[wk] = {};\n    if (sub === 'status') weekCols[wk].status = c;\n    else if (sub.includes('vc')) weekCols[wk].vc = c;\n    else if (sub.includes('estim') || sub === 'est') weekCols[wk].est = c;\n    else if (sub.includes('plan')) weekCols[wk].plan = c;\n    else if (sub.includes('task') || sub.includes('taak') || sub.includes('description')) weekCols[wk].task = c;\n  }\n\n  // Loop data-rijen, forward-fill (Order, SO, Part)\n  let curOrder = '', curSO = '', curPart = '', curLoc = '';\n  const partsMap = new Map();\n  for (let r = secondHeaderRow + 1; r < rows.length; r++) {\n    const row = rows[r] || [];\n    const o = String(row[orderCol] || '').trim();\n    const s = soCol >= 0 ? String(row[soCol] || '').trim() : '';\n    const pRaw = String(row[partCol] || '').trim();\n    const loc = locCol >= 0 ? String(row[locCol] || '').trim() : '';\n    if (o) curOrder = o;\n    if (s) curSO = s;\n    if (pRaw) { curPart = pRaw; curLoc = loc; }\n    if (!curOrder || !/^\\d+$/.test(curOrder) || !curPart) continue;\n\n    const key = curOrder + '|' + curSO + '|' + curPart;\n    if (!partsMap.has(key)) {\n      partsMap.set(key, { order: curOrder, so: curSO, part: curPart, location: curLoc, weeks: new Map() });\n    }\n    const grp = partsMap.get(key);\n\n    for (const wkStr of Object.keys(weekCols)) {\n      const wk = parseInt(wkStr);\n      const wc = weekCols[wk];\n      const task = wc.task !== undefined ? String(row[wc.task] || '').trim() : '';\n      if (task && task.toLowerCase() === 'total') continue;\n      const status = wc.status !== undefined ? numOrZero(row[wc.status]) : 0;\n      const vc = wc.vc !== undefined ? numOrZero(row[wc.vc]) : 0;\n      const est = wc.est !== undefined ? numOrZero(row[wc.est]) : 0;\n      const pln = wc.plan !== undefined ? numOrZero(row[wc.plan]) : 0;\n      if (!task && !status && !vc && !est && !pln) continue;\n      if (!grp.weeks.has(wk)) grp.weeks.set(wk, { week: wk, tasks: [], status: 0, vc: 0, est: 0, plan: 0 });\n      const w = grp.weeks.get(wk);\n      if (task && !w.tasks.includes(task)) w.tasks.push(task);\n      if (status) w.status = status;\n      w.vc += vc;\n      w.est += est;\n      w.plan += pln;\n    }\n  }\n\n  // Aggregeer per Order\n  const ordersAgg = new Map();\n  for (const grp of partsMap.values()) {\n    if (!ordersAgg.has(grp.order)) ordersAgg.set(grp.order, { number: grp.order, location: '', parts: [] });\n    const inf = deriveWerkbonInfo(grp.part, grp.so, grp.location);\n    const weeks = Array.from(grp.weeks.values()).sort((a, b) => a.week - b.week);\n    ordersAgg.get(grp.order).parts.push({\n      partKey: inf.partKey, number: inf.werkbonNumber, description: grp.part, zone: inf.zone,\n      so: grp.so, excelPartText: grp.part, weeks\n    });\n  }\n  // Dedupliceer werkbon-nummers binnen één order met letter-suffix\n  for (const o of ordersAgg.values()) {\n    const seen = {};\n    o.parts.forEach(p => {\n      const base = p.number;\n      seen[base] = (seen[base] || 0) + 1;\n      if (seen[base] > 1) p.number = base + String.fromCharCode(96 + seen[base]);\n    });\n  }\n\n  return {\n    orders: Array.from(ordersAgg.values()),\n    headerRow: headerRow,\n    weeksFound: Object.keys(weekCols).map(Number).sort((a, b) => a - b)\n  };\n}\n\nfunction deriveWerkbonInfo(partText, so, location) {\n  const t = String(partText || '').toLowerCase().trim();\n  const soPart = String(parseInt(so) || 10).padStart(2, '0');\n  const m = t.match(/(\\d{3,4})/);\n  if (m) {\n    const tail = m[1].padStart(3, '0');\n    return { werkbonNumber: soPart + tail, partKey: location || 'L', zone: zoneFromLocation(location) };\n  }\n  let X = null;\n  if (/top\\s*&\\s*bottom\\s*head|top.*head|bottom.*head/.test(t)) {\n    return { werkbonNumber: soPart + '080', partKey: 'TB', zone: 'TB' };\n  }\n  if (/skirt|voetring/.test(t)) X = 5;\n  else if (/insulation|isolat/.test(t)) X = 7;\n  else if (/top.*final/.test(t)) X = 4;\n  else if (/bottom.*final/.test(t)) X = 4;\n  else if (/final.*assembly/.test(t)) X = 4;\n  else if (/top.*assembly/.test(t)) X = 1;\n  else if (/bottom.*assembly/.test(t)) X = 3;\n  else if (/installat|montage/.test(t)) X = 9;\n  if (X !== null) {\n    return { werkbonNumber: soPart + X + '00', partKey: location || (X === 7 ? 'ISO' : 'L'), zone: zoneFromLocation(location) || (X === 7 ? 'ISO' : 'Hal L') };\n  }\n  return { werkbonNumber: soPart + '900', partKey: location || 'L', zone: zoneFromLocation(location) || 'Hal L' };\n}\n\nfunction zoneFromLocation(loc) {\n  const l = String(loc || '').toLowerCase().trim();\n  if (l === 'm') return 'Hal M';\n  if (l === 'l') return 'Hal L';\n  if (l === 'tb') return 'TB';\n  if (l === 'iso') return 'ISO';\n  if (l === 'mon') return 'Hal L';\n  return '';\n}\n\nfunction _legacy_unused_oldHeader_ignored(rows) {\n  if (!rows || rows.length < 2) return null;\n  let headerRow = -1;\n  let headerAbove = -1;\n\n  const headers = (rows[headerRow] || []).map(c => String(c || '').trim());\n  const above = headerAbove >= 0 ? (rows[headerAbove] || []).map(c => String(c || '').trim()) : [];\n\n  const colIdx = { order: -1, so: -1, location: -1, part: -1, task: -1, status: -1, vc: -1, est: -1, plan: -1 };\n  const weekCols = {};\n\n  const aboveFilled = [];\n  let lastAbove = '';\n  for (let c = 0; c < Math.max(headers.length, above.length); c++) {\n    const v = (above[c] || '').trim();\n    if (v) lastAbove = v;\n    aboveFilled[c] = lastAbove;\n  }\n\n  for (let c = 0; c < headers.length; c++) {\n    const h = headers[c].toLowerCase();\n    const g = (aboveFilled[c] || '').toLowerCase();\n\n    const weekMatch = (h + ' ' + g).match(/\\bw(?:eek)?\\s*(\\d{1,2})\\b/i);\n    if (weekMatch) {\n      const wk = parseInt(weekMatch[1]);\n      if (wk >= 1 && wk <= 53) {\n        if (!weekCols[wk]) weekCols[wk] = {};\n        if (h === 'status' || h.includes('status')) weekCols[wk].status = c;\n        else if (h.includes('task') || h.includes('taak') || h.includes('description') || h.includes('omschrijv')) weekCols[wk].task = c;\n        else if (h === 'vc' || h.includes('vc hour')) weekCols[wk].vc = c;\n        else if (h.includes('estimated') || h === 'est' || h.includes('est hour')) weekCols[wk].est = c;\n        else if (h.includes('planning') || h === 'plan' || h.includes('plan hour')) weekCols[wk].plan = c;\n        else if (!weekCols[wk].task && h.length > 2) weekCols[wk].task = c;\n        continue;\n      }\n    }\n\n    if (h === 'order') colIdx.order = c;\n    else if (h === 'so') colIdx.so = c;\n    else if (h === 'location' || h === 'locatie') colIdx.location = c;\n    else if (h === 'part' || h === 'onderdeel') colIdx.part = c;\n    else if (h.includes('task') || h.includes('description') || h.includes('omschrijv')) { if (colIdx.task < 0) colIdx.task = c; }\n    else if (h === 'status') { if (colIdx.status < 0) colIdx.status = c; }\n    else if (h.includes('vc')) colIdx.vc = c;\n    else if (h.includes('estimated') || h === 'est') colIdx.est = c;\n    else if (h.includes('planning') || h === 'plan') colIdx.plan = c;\n  }\n\n  if (colIdx.order < 0 || colIdx.part < 0) return null;\n\n  const ordersMap = new Map();\n  for (let r = headerRow + 1; r < rows.length; r++) {\n    const row = rows[r] || [];\n    const order = String(row[colIdx.order] || '').trim();\n    if (!order || !/^\\d/.test(order)) continue;\n    const part = String(row[colIdx.part] || '').trim();\n    if (!part) continue;\n\n    const taskBase = colIdx.task >= 0 ? String(row[colIdx.task] || '').trim() : '';\n    const location = colIdx.location >= 0 ? String(row[colIdx.location] || '').trim() : '';\n\n    if (!ordersMap.has(order)) {\n      ordersMap.set(order, { number: order, location, parts: new Map() });\n    }\n    const o = ordersMap.get(order);\n    if (!o.location && location) o.location = location;\n\n    const partKey = part.toUpperCase();\n    if (!o.parts.has(partKey)) {\n      o.parts.set(partKey, {\n        partKey,\n        number: partKey,\n        description: taskBase || partLabel(partKey),\n        zone: PART_TO_ZONE[partKey] || 'Hal L',\n        weeks: new Map(),\n      });\n    }\n    const p = o.parts.get(partKey);\n    if (taskBase && (!p.description || p.description === partLabel(partKey))) p.description = taskBase;\n\n    for (const wkStr of Object.keys(weekCols)) {\n      const wk = parseInt(wkStr);\n      const wc = weekCols[wk];\n      const status = wc.status !== undefined ? numOrZero(row[wc.status]) : 0;\n      const task = wc.task !== undefined ? String(row[wc.task] || '').trim() : '';\n      const vc = wc.vc !== undefined ? numOrZero(row[wc.vc]) : 0;\n      const est = wc.est !== undefined ? numOrZero(row[wc.est]) : 0;\n      const plan = wc.plan !== undefined ? numOrZero(row[wc.plan]) : 0;\n\n      if (!status && !task && !vc && !est && !plan) continue;\n\n      if (!p.weeks.has(wk)) {\n        p.weeks.set(wk, { week: wk, tasks: [], status: 0, vc: 0, est: 0, plan: 0 });\n      }\n      const w = p.weeks.get(wk);\n      if (status) w.status = status;\n      if (task && !w.tasks.includes(task)) w.tasks.push(task);\n      w.vc += vc;\n      w.est += est;\n      w.plan += plan;\n    }\n  }\n\n  const ordersArr = [];\n  for (const o of ordersMap.values()) {\n    const parts = [];\n    for (const p of o.parts.values()) {\n      const weeks = Array.from(p.weeks.values()).sort((a, b) => a.week - b.week);\n      parts.push({ partKey: p.partKey, number: p.number, description: p.description, zone: p.zone, weeks });\n    }\n    if (parts.length) ordersArr.push({ number: o.number, location: o.location, parts });\n  }\n\n  const weeksFound = Array.from(Object.keys(weekCols)).map(n => parseInt(n)).sort((a, b) => a - b);\n  return { orders: ordersArr, headerRow, weeksFound };\n}\n\nfunction partLabel(part) {\n  const map = { TB: 'Top & Bottom head (TB)', M: 'Assembly Hal M', L: 'Final assembly (L)', ISO: 'Insulation (ISO)', PREP: 'Preparation (PREP)' };\n  return map[part] || part;\n}\n\nfunction numOrZero(v) {\n  if (v === null || v === undefined || v === '') return 0;\n  const n = Number(String(v).replace(',', '.'));\n  return isNaN(n) ? 0 : n;\n}\n\nfunction applyExcelImport(parsed) {\n  let addedProjects = 0, addedWerkbonnen = 0, addedWeeks = 0, updatedWeeks = 0;\n  const cw = getCurrentWeek();\n  const importedProjectIds = new Set();\n\n  for (const o of parsed.orders) {\n    let project = state.projects.find(p => String(p.number).trim() === String(o.number).trim());\n    if (!project) {\n      project = { id: uid(), number: o.number, klant: '', description: '', werkbonnen: [] };\n      state.projects.push(project);\n      addedProjects++;\n    }\n    importedProjectIds.add(project.id);\n\n    for (const p of o.parts) {\n      const excelKey = o.number + '|' + (p.so || '') + '|' + (p.excelPartText || p.description || '');\n      let werkbon = project.werkbonnen.find(w => w.excel_key === excelKey)\n                 || project.werkbonnen.find(w => (w.number || '').toUpperCase() === p.number.toUpperCase() && !w.excel_key);\n      if (!werkbon) {\n        werkbon = {\n          id: uid(), number: p.number, description: p.description, zone: p.zone, so: p.so,\n          drawing_sheet: '', drawing_notes: '', excel_key: excelKey,\n          excel_part_text: p.excelPartText, weeks: [],\n        };\n        project.werkbonnen.push(werkbon);\n        addedWerkbonnen++;\n      } else {\n        werkbon.excel_key = excelKey;\n        werkbon.so = p.so;\n        werkbon.excel_part_text = p.excelPartText;\n        if (!werkbon.description || werkbon.description === partLabel(p.partKey)) werkbon.description = p.description;\n        if (!werkbon.zone) werkbon.zone = p.zone;\n      }\n\n      // Verwijder oude excel-weken die niet meer in plan staan (zonder verlies van bewerkte info)\n      const excelWeekNrs = new Set(p.weeks.map(w => w.week));\n      werkbon.weeks = werkbon.weeks.filter(w => {\n        if (w.source === 'excel' && !excelWeekNrs.has(w.week) && w.confirmed_pct == null && (!w.photos || !w.photos.length) && !w.remark) return false;\n        return true;\n      });\n\n      for (const wk of p.weeks) {\n        let week = werkbon.weeks.find(x => x.week === wk.week);\n        const weekdoelNew = wk.tasks.join(' · ');\n        const tasksNew = wk.tasks.slice();\n        const uurSamenvatting = [];\n        if (wk.vc > 0) uurSamenvatting.push('VC ' + wk.vc + 'u');\n        if (wk.est > 0) uurSamenvatting.push('Est ' + wk.est + 'u');\n        if (wk.plan > 0) uurSamenvatting.push('Plan ' + wk.plan + 'u');\n        if (!week) {\n          week = {\n            id: uid(), week: wk.week, weekdoel: weekdoelNew, tasks: tasksNew, tasks_done: {},\n            streef_pct: wk.status ? 100 : 50, photos: [], ai_pct: null, ai_toelichting: '',\n            confirmed_pct: null, remark: '', excel_status: wk.status,\n            vc_hours: wk.vc, estimated_hours: wk.est, planning_hours: wk.plan,\n            uurSummary: uurSamenvatting.join(' · '), source: 'excel',\n          };\n          werkbon.weeks.push(week);\n          addedWeeks++;\n        } else {\n          week.excel_status = wk.status; week.vc_hours = wk.vc; week.estimated_hours = wk.est; week.planning_hours = wk.plan;\n          week.uurSummary = uurSamenvatting.join(' · ');\n          if (weekdoelNew && (week.source === 'excel' || !week.weekdoel || !week.weekdoel.trim())) {\n            week.weekdoel = weekdoelNew; week.source = 'excel';\n            week.tasks = tasksNew;\n            const oldDone = week.tasks_done || {};\n            week.tasks_done = {};\n            tasksNew.forEach(t => { if (oldDone[t]) week.tasks_done[t] = oldDone[t]; });\n          }\n          updatedWeeks++;\n        }\n      }\n    }\n  }\n\n  // Completion check per geïmporteerd project\n  let completedFlagged = 0;\n  for (const project of state.projects) {\n    if (!importedProjectIds.has(project.id)) continue;\n    let hasFutureTask = false, hasAnyExcelWeek = false;\n    for (const w of project.werkbonnen || []) {\n      for (const wk of w.weeks || []) {\n        if (wk.source === 'excel') {\n          hasAnyExcelWeek = true;\n          if (wk.week >= cw && (wk.weekdoel || wk.estimated_hours > 0 || wk.planning_hours > 0)) hasFutureTask = true;\n        }\n      }\n    }\n    project.completed_per_buildingplan = hasAnyExcelWeek && !hasFutureTask;\n    if (project.completed_per_buildingplan) completedFlagged++;\n    project.last_excel_check_at = new Date().toISOString();\n    project.last_excel_check_week = cw;\n  }\n\n  state._meta = state._meta || {};\n  state._meta.lastExcelImportAt = new Date().toISOString();\n  state._meta.lastExcelImportBy = getUsername() || 'onbekend';\n  save(); render();\n  toast('Import klaar: +' + addedProjects + ' projecten · +' + addedWerkbonnen + ' werkbonnen · +' + addedWeeks + '/~' + updatedWeeks + ' weken' + (completedFlagged ? ' · ' + completedFlagged + '× klaar volgens bouwplan' : ''));\n}\n\nfunction showExcelDiagnoseModal(workbook, parsed) {\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'Geen bouwplan-regels gevonden'));\n      m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px;' },\n        'De parser kon geen header-rij vinden met de kolommen Order, Part en Task description. ' +\n        'Hieronder zie je per blad de eerste 8 rijen — kopieer of stuur dit zodat we de parser kunnen aanpassen.'));\n      const wrap = el('div', { style: 'max-height: 360px; overflow: auto; font-family: monospace; font-size: 11px; background: var(--grey-50); padding: 10px; border-radius: var(--radius);' });\n      workbook.SheetNames.forEach(name => {\n        const ws = workbook.Sheets[name];\n        if (!ws) return;\n        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });\n        wrap.appendChild(el('div', { style: 'font-weight: 700; color: var(--teal-dark); margin-top: 8px;' }, '== Blad: ' + name + ' (' + rows.length + ' rijen) =='));\n        rows.slice(0, 8).forEach((row, i) => {\n          const cells = row.map(c => String(c || '').slice(0, 18)).slice(0, 14).join(' | ');\n          wrap.appendChild(el('div', {}, 'r' + i + ': ' + cells));\n        });\n      });\n      m.appendChild(wrap);\n      m.appendChild(el('div', { class: 'actions' },\n        el('button', { class: 'btn primary', onClick: closeModal }, 'Sluiten')\n      ));\n    }\n  };\n  render();\n}\n\nfunction showExcelPreviewModal(parsed) {\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'Import uit Excel'));\n      m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px; margin-top: -4px;' },\n        'Blad: ' + parsed.sheetName + ' · ' + parsed.orders.length + ' orders · weken ' + (parsed.weeksFound.length ? ('W' + parsed.weeksFound[0] + '\\u2013W' + parsed.weeksFound[parsed.weeksFound.length - 1]) : '\\u2014')));\n\n      const totalWerkbonnen = parsed.orders.reduce((a, o) => a + o.parts.length, 0);\n      const totalWeeks = parsed.orders.reduce((a, o) => a + o.parts.reduce((b, p) => b + p.weeks.length, 0), 0);\n      m.appendChild(el('div', { style: 'padding: 10px; background: var(--grey-50); border-radius: var(--radius); font-size: 13px; margin-bottom: 12px;' },\n        el('div', {}, '\\u2022 ' + parsed.orders.length + ' orders (projecten)'),\n        el('div', {}, '\\u2022 ' + totalWerkbonnen + ' werkbonnen (Order \\u00d7 Part)'),\n        el('div', {}, '\\u2022 ' + totalWeeks + ' gevulde weekregels')\n      ));\n\n      const list = el('div', { style: 'max-height: 260px; overflow: auto; border: 1px solid var(--grey-100); border-radius: var(--radius); padding: 8px; font-size: 12px; font-family: monospace;' });\n      parsed.orders.forEach(o => {\n        const parts = o.parts.map(p => p.partKey + '(' + p.weeks.length + 'w)').join(' ');\n        list.appendChild(el('div', {}, o.number + '  ' + parts));\n      });\n      m.appendChild(list);\n\n      m.appendChild(el('div', { style: 'padding: 10px; background: var(--teal-light); color: var(--teal-dark); border-radius: var(--radius); font-size: 12px; margin-top: 10px;' },\n        'Bestaande projecten, werkbonnen en weken worden aangevuld \\u2014 foto\\u2019s, notities, floorplans en bevestigde percentages blijven staan.'));\n\n      m.appendChild(el('div', { class: 'actions' },\n        el('button', { class: 'btn', onClick: closeModal }, 'Annuleer'),\n        el('button', { class: 'btn primary', onClick: () => { closeModal(); applyExcelImport(parsed); } }, 'Importeer')\n      ));\n    }\n  };\n  render();\n}\n\n// ---------- Persistence ----------\nfunction save() {\n  try {\n    localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: state.projects, _meta: state._meta }));\n  } catch (e) {\n    console.warn('localStorage vol \\u2014 foto\\u2019s nemen te veel ruimte');\n  }\n  if (fileHandle) {\n    if (writeTimer) clearTimeout(writeTimer);\n    writeTimer = setTimeout(() => { writeToFile(); }, WRITE_DEBOUNCE);\n  }\n}\nfunction load() {\n  try {\n    const raw = localStorage.getItem(STORAGE_KEY);\n    if (raw) {\n      const parsed = JSON.parse(raw);\n      if (parsed.projects) state.projects = parsed.projects;\n      if (parsed._meta) state._meta = parsed._meta;\n    }\n  } catch (e) {}\n}\n\n// ---------- Helpers ----------\nfunction uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }\nfunction el(tag, attrs = {}, ...children) {\n  const e = document.createElement(tag);\n  for (const k in attrs) {\n    if (k === 'onClick') e.addEventListener('click', attrs[k]);\n    else if (k === 'onChange') e.addEventListener('change', attrs[k]);\n    else if (k === 'onInput') e.addEventListener('input', attrs[k]);\n    else if (k === 'html') e.innerHTML = attrs[k];\n    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);\n    else e.setAttribute(k, attrs[k]);\n  }\n  for (const c of children.flat()) {\n    if (c == null || c === false) continue;\n    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));\n    else e.appendChild(c);\n  }\n  return e;\n}\nfunction toast(msg) {\n  const t = el('div', { class: 'toast' }, msg);\n  document.body.appendChild(t);\n  setTimeout(() => t.remove(), 2000);\n}\n\nfunction getProject() { return state.projects.find(p => p.id === state.projectId); }\nfunction getWerkbon() { const p = getProject(); return p && p.werkbonnen.find(w => w.id === state.werkbonId); }\nfunction getWeek() { const w = getWerkbon(); return w && w.weeks.find(x => x.id === state.weekId); }\n\nfunction navigate(view, ids = {}) {\n  state.view = view;\n  if (ids.projectId !== undefined) state.projectId = ids.projectId;\n  if (ids.werkbonId !== undefined) state.werkbonId = ids.werkbonId;\n  if (ids.weekId !== undefined) state.weekId = ids.weekId;\n  render();\n}\n\nfunction weekStatus(week) {\n  if (!week) return 'grey';\n  if (week.confirmed_pct === null || week.confirmed_pct === undefined) {\n    if (week.ai_pct !== null && week.ai_pct !== undefined) return 'grey';\n    return 'grey';\n  }\n  const diff = week.confirmed_pct - week.streef_pct;\n  if (diff >= -10) return 'green';\n  if (diff >= -25) return 'amber';\n  return 'red';\n}\nfunction werkbonStatus(werkbon) {\n  if (!werkbon || !werkbon.weeks.length) return 'grey';\n  const latest = werkbon.weeks.slice().sort((a, b) => b.week - a.week)[0];\n  return weekStatus(latest);\n}\n\nasync function processPhoto(file) {\n  return new Promise(resolve => {\n    const reader = new FileReader();\n    reader.onload = e => {\n      const img = new Image();\n      img.onload = () => {\n        const canvas = document.createElement('canvas');\n        const maxW = 1000;\n        const scale = Math.min(1, maxW / img.width);\n        canvas.width = Math.round(img.width * scale);\n        canvas.height = Math.round(img.height * scale);\n        const ctx = canvas.getContext('2d');\n        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);\n        resolve(canvas.toDataURL('image/jpeg', 0.75));\n      };\n      img.src = e.target.result;\n    };\n    reader.readAsDataURL(file);\n  });\n}\n\nfunction buildAiPrompt(project, werkbon, week) {\n  return `Ik bereid het wekelijks planningsoverleg voor bij Gpi Tanks. Geef op basis van onderstaande informatie en bijgevoegde foto('s) een voorstel-voortgangspercentage.\n\nPROJECT\n- Nummer: ${project.number}\n- Klant: ${project.klant || '\\u2014'}\n- Omschrijving: ${project.description || '\\u2014'}\n\nWERKBON\n- Nummer: ${werkbon.number}\n- Omschrijving: ${werkbon.description}\n- Zone: ${werkbon.zone}\n\nWEEK W${week.week}\n- Weekdoel: ${week.weekdoel}\n- Streef-% einde week: ${week.streef_pct}%\n- Aantal foto's bijgevoegd: ${(week.photos || []).length}\n\nGeef antwoord in precies dit formaat zodat ik het in de pilot-app kan plakken:\n\nPCT: <25 | 50 | 75 | 100>\nUITLEG: <\\u00e9\\u00e9n zin, wat zichtbaar is in de foto tegen het weekdoel>`;\n}\n\nfunction copyToClipboard(text) {\n  navigator.clipboard.writeText(text).then(() => toast('Prompt gekopieerd'),\n    () => { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); toast('Prompt gekopieerd'); } catch (e) { alert(text); } ta.remove(); });\n}\n\n// ---------- Render root ----------\nfunction render() {\n  const app = document.getElementById('app');\n  app.innerHTML = '';\n  app.appendChild(renderTop());\n  const meta = renderSyncMeta();\n  if (meta) app.appendChild(meta);\n  app.appendChild(renderCrumbs());\n  const main = el('div', { class: 'main' });\n  switch (state.view) {\n    case 'home': renderHome(main); break;\n    case 'project': renderProject(main); break;\n    case 'werkbon': renderWerkbon(main); break;\n    case 'week': renderWeek(main); break;\n  }\n  app.appendChild(main);\n  if (state.modal) app.appendChild(renderModal());\n}\n\nfunction renderTop() {\n  let syncWidget;\n  if (syncStatus === 'ok') {\n    syncWidget = el('div', { class: 'sync-status ok', onClick: showSettingsModal, title: 'Gedeeld bestand actief' },\n      el('span', { class: 'dot green' }),\n      'Gedeeld actief'\n    );\n  } else if (syncStatus === 'warn') {\n    syncWidget = el('div', { class: 'sync-status warn', onClick: reactivateHandle, title: 'Klik om te heractiveren' },\n      el('span', { class: 'dot amber' }),\n      'Klik om te heractiveren'\n    );\n  } else {\n    syncWidget = el('div', { class: 'sync-status off', onClick: showSettingsModal, title: 'Lokaal \\u2014 klik om te koppelen' },\n      el('span', { class: 'dot grey' }),\n      'Lokaal'\n    );\n  }\n  const cw = getCurrentWeek();\n  return el('div', { class: 'top' },\n    el('div', { class: 'top-brand', onClick: () => navigate('home'), style: 'cursor: pointer;' },\n      el('img', { class: 'logo', src: (window.__resources && window.__resources.logoGpiGroup) || 'assets/logo-gpi-group.png', alt: 'Gpi Group' }),\n      el('div', { class: 'divider' }),\n      el('div', { class: 'product' },\n        el('div', { class: 'eyebrow' }, 'Gpi Tanks \\u00b7 Pilot ' + FLOORSCAN_VERSION),\n        el('div', { class: 'name' }, 'FloorScan')\n      )\n    ),\n    el('div', { class: 'top-actions' },\n      el('div', { class: 'week-pill', onClick: () => navigate('home'), title: 'Huidige week \\u2014 ga naar overzicht', style: 'cursor: pointer;' },\n        'Week ' + cw\n      ),\n      syncWidget,\n      el('button', { class: 'btn sm ghost', onClick: showSettingsModal }, 'Instellingen')\n    )\n  );\n}\n\nfunction   (werkbonsThisWeek ? ' \\u00b7 ' + werkbonsBevestigd + '/' + werkbonsThisWeek + ' bevestigd' : ' \\u00b7 geen werkbon-regels'))\n  ));\n  const actions = el('div', { class: 'cw-actions' });\n  actions.appendChild(el('button', { class: 'btn primary', onClick: startQrScanFlow, title: 'Scan QR-code op de tank' },\n    '\\ud83d\\udcf7 Scan QR-code'\n  ));\n  if (werkbonsThisWeek) {\n    actions.appendChild(el('button', { class: 'btn', onClick: () => showCurrentWeekListModal(cw) }, '\\u2022 Lijst deze week'));\n  }\n  banner.appendChild(actions);\n  return banner;\n}\n\nfunction showCurrentWeekListModal(cw) {\n  const items = [];\n  state.projects.forEach(p => (p.werkbonnen || []).forEach(w => {\n    const wk = (w.weeks || []).find(x => x.week === cw);\n    if (wk) items.push({ project: p, werkbon: w, week: wk });\n  }));\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'Werkbonnen deze week (W' + cw + ')'));\n      if (!items.length) {\n        m.appendChild(el('p', { style: 'color: var(--grey-500);' }, 'Geen werkbon-regels voor deze week.'));\n      } else {\n        items.forEach(({ project, werkbon, week }) => {\n          const st = weekStatus(week);\n          const row = el('div', { class: 'card', style: 'margin-bottom: 6px; padding: 10px 12px;' },\n            el('div', { class: 'card-row', onClick: () => { closeModal(); navigate('week', { projectId: project.id, werkbonId: werkbon.id, weekId: week.id }); } },\n              el('div', {},\n                el('div', { class: 'card-title', style: 'font-size: 14px;' }, project.number + ' \\u00b7 ' + werkbon.number),\n                el('div', { class: 'card-sub', style: 'font-size: 12px;' }, werkbon.description + ' \\u00b7 ' + (week.weekdoel || '\\u2014') + ' \\u00b7 ' + (week.confirmed_pct != null ? week.confirmed_pct + '%' : 'nog niet bevestigd'))\n              ),\n              el('span', { class: 'dot ' + st })\n            )\n          );\n          m.appendChild(row);\n        });\n
