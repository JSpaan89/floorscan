 exportData() {\n  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = 'floorscan_export_' + new Date().toISOString().slice(0, 10) + '.json';\n  a.click();\n  URL.revokeObjectURL(url);\n  toast('Export gedownload');\n}\nfunction triggerImport() {\n  const inp = document.createElement('input');\n  inp.type = 'file';\n  inp.accept = 'application/json';\n  inp.onchange = e => {\n    const f = e.target.files[0];\n    const r = new FileReader();\n    r.onload = ev => {\n      try {\n        const parsed = JSON.parse(ev.target.result);\n        if (!parsed.projects) throw new Error('Geen projects-veld');\n        if (!confirm('Huidige data vervangen door import?')) return;\n        state = Object.assign(state, parsed, { view: 'home', projectId: null, werkbonId: null, weekId: null, modal: null });\n        save(); render(); toast('Import geladen');\n      } catch (err) { alert('Import mislukt: ' + err.message); }\n    };\n    r.readAsText(f);\n  };\n  inp.click();\n}\n\n// ---------- QR-scan & QR-generatie ----------\n//\n// QR-payload (primair formaat): \"<projectnummer>-<werkbonnummer>\"\n// Voorbeeld: \"325277-10300\" (project 325277, suborder 10, X=3 = Bottom, UU=00 = hoofd-werkbon)\n//\nlet qrScanner = null;\n\nfunction parseQrPayload(text) {\n  if (!text) return null;\n  const t = String(text).trim();\n\n  // Format 1: JSON-payload (eigen Gpi format)\n  if (t.startsWith('{')) {\n    try {\n      const j = JSON.parse(t);\n      const proj = j.p || j.project || j.projectnummer;\n      const wb = j.w || j.wb || j.werkbon || j.werkbonnummer;\n      if (proj && wb) return { kind: 'standard', project: String(proj), werkbon: String(wb), raw: t };\n    } catch (e) {}\n  }\n\n  // Format 2: URL met ?p=&w= parameters (eigen Gpi format)\n  if (/^https?:\\/\\//i.test(t)) {\n    try {\n      const url = new URL(t);\n      const proj = url.searchParams.get('p') || url.searchParams.get('project');\n      const wb = url.searchParams.get('w') || url.searchParams.get('werkbon');\n      if (proj && wb) return { kind: 'standard', project: proj, werkbon: wb, raw: t };\n    } catch (e) {}\n  }\n\n  // Format 3: Smarticate-fallback — herkent SPCPART-id ergens in payload (URL of plain).\n  // Smarticate-stickers bevatten alleen een verwijzing (vermoedelijk naar hun cloud), zonder\n  // direct project/werkbon-info. Resolve handmatig via cache (zie resolveSpcpartAndContinue).\n  const spcMatch = t.match(/SPCPART[\\-_]?(\\d+)/i);\n  if (spcMatch) {\n    return { kind: 'spcpart', spcpartId: 'SPCPART' + spcMatch[1], raw: t };\n  }\n\n  // Format 4: <projectnr>-<werkbonnr> en variaties (Gpi standaard sticker)\n  const cleaned = t.replace(/^FS[:|\\-]/i, '');\n  const parts = cleaned.split(/[|;\\/\\-_,\\s]+/).map(s => s.trim()).filter(Boolean);\n  if (parts.length >= 2 && /^\\d+$/.test(parts[0]) && /^\\w+$/.test(parts[1])) {\n    return { kind: 'standard', project: parts[0], werkbon: parts[1], raw: t };\n  }\n\n  return null;\n}\n\n// SPCPART-resolve cache: { \"SPCPART213013\": { project, werkbon, desc, resolvedAt } }\nfunction getSpcpartCache() {\n  try { return JSON.parse(localStorage.getItem('floorscan_spcpart_map') || '{}'); }\n  catch (e) { return {}; }\n}\nfunction saveSpcpartMapping(spcpartId, project, werkbon, desc) {\n  const cache = getSpcpartCache();\n  cache[spcpartId] = {\n    project: String(project),\n    werkbon: String(werkbon),\n    desc: desc || '',\n    resolvedAt: new Date().toISOString()\n  };\n  localStorage.setItem('floorscan_spcpart_map', JSON.stringify(cache));\n}\n\n// Resolveer een Smarticate-QR. Gebruikt cache; vraagt anders eenmalig om koppeling.\nfunction resolveSpcpartAndContinue(parsed) {\n  const cache = getSpcpartCache();\n  const cached = cache[parsed.spcpartId];\n  if (cached) {\n    toast('Smarticate-sticker herkend: ' + parsed.spcpartId);\n    resolveQrTargetAndStartPhotos(cached.project, cached.werkbon);\n    return;\n  }\n  showSpcpartLinkModal(parsed);\n}\n\nfunction showSpcpartLinkModal(parsed) {\n  const projects = state.projects || [];\n  state.modal = {\n    onClose: () => {},\n    render: m => {\n      m.appendChild(el('h3', {}, 'Smarticate-sticker koppelen'));\n      m.appendChild(el('div', { style: 'padding: 10px; background: var(--amber-light); color: var(--amber-dark); border-radius: var(--radius); font-size: 13px; margin-bottom: 12px;' },\n        'Deze QR-sticker komt van Smarticate (id: ', el('b', {}, parsed.spcpartId),\n        '). De QR bevat geen project/werkbon-info, dus eenmalig handmatig koppelen. Daarna onthoudt de app de koppeling.'\n      ));\n      m.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 8px;' },\n        'QR-inhoud: ' + (parsed.raw || '').slice(0, 80)));\n\n      const fldP = el('div', { class: 'field' });\n      fldP.appendChild(el('label', {}, 'Projectnummer (op de Smarticate-sticker zichtbaar)'));\n      const projInput = el('input', { type: 'text', placeholder: 'bv. 325277', list: 'spc-projects-' + parsed.spcpartId });\n      fldP.appendChild(projInput);\n      const dl = el('datalist', { id: 'spc-projects-' + parsed.spcpartId });\n      projects.forEach(p => dl.appendChild(el('option', { value: p.number })));\n      fldP.appendChild(dl);\n      m.appendChild(fldP);\n\n      const fldW = el('div', { class: 'field' });\n      fldW.appendChild(el('label', {}, 'Werkbonnummer (5-cijferig, bv. 11100 of 30300)'));\n      const wbInput = el('input', { type: 'text', placeholder: 'bv. 11100' });\n      fldW.appendChild(wbInput);\n      m.appendChild(fldW);\n\n      m.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 12px;' },\n        'Tip: kijk naar de tekst rechts naast de QR — daar staat het projectnr en werkbonnr.'\n      ));\n\n      m.appendChild(el('div', { class: 'actions', style: 'flex-wrap: wrap;' },\n        el('button', { class: 'btn', onClick: closeModal }, 'Annuleer'),\n        el('button', { class: 'btn primary', onClick: () => {\n          const proj = (projInput.value || '').trim();\n          const wb = (wbInput.value || '').trim();\n          if (!proj || !wb) { alert('Vul beide velden in.'); return; }\n          saveSpcpartMapping(parsed.spcpartId, proj, wb, '');\n          closeModal();\n          resolveQrTargetAndStartPhotos(proj, wb);\n        } }, 'Koppelen + doorgaan')\n      ));\n    }\n  };\n  render();\n}\n\nfunction inferPartFromWerkbonNr(wb) {\n  const s = String(wb).trim();\n  const m = s.match(/^(\\d{2})(\\d)(\\d{2})$/);\n  if (!m) return { part: 'L', zone: 'Hal L', isPrep: false, isHead: false };\n  const X = parseInt(m[2]);\n  const UU = parseInt(m[3]);\n  const isHead = UU >= 70 && UU <= 89;\n  const isPrep = UU > 0 && !isHead;\n  if (isHead) return { part: 'TB', zone: 'TB', isPrep: false, isHead: true };\n  if (isPrep) return { part: 'PREP', zone: 'PREP', isPrep: true, isHead: false };\n  switch (X) {\n    case 1: return { part: 'M', zone: 'Hal M', desc: 'Top assembly' };\n    case 3: return { part: 'M', zone: 'Hal M', desc: 'Bottom assembly' };\n    case 4: return { part: 'L', zone: 'Hal L', desc: 'Final assembly' };\n    case 5: return { part: 'M', zone: 'Hal M', desc: 'Skirt / support' };\n    case 7: return { part: 'ISO', zone: 'ISO', desc: 'Insulation' };\n    case 9: return { part: 'L', zone: 'Hal L', desc: 'Installation equipment' };\n    default: return { part: 'L', zone: 'Hal L' };\n  }\n}\n\nfunction cameraAvailable() {\n  return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) &&\n         (window.isSecureContext || ['localhost', '127.0.0.1'].includes(location.hostname));\n}\n\nfunction startQrScanFlow() {\n  if (typeof Html5Qrcode === 'undefined') {\n    alert('QR-bibliotheek niet geladen (check internetverbinding).');\n    return;\n  }\n  const camOk = cameraAvailable();\n  state.modal = {\n    onClose: stopQrScanner,\n    render: m => {\n      m.appendChild(el('h3', {}, 'Scan QR-code'));\n      if (camOk) {\n        m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px;' },\n          'Richt de camera op de QR-sticker. Werkt voor standaard Gpi-stickers (',\n          el('code', {}, '325277-10300'), ') én Smarticate-stickers (SPCPART…). ',\n          'Smarticate eenmaal koppelen, daarna onthoudt de app het.'));\n        const reader = el('div', { id: 'qr-reader', class: 'qr-reader' });\n        m.appendChild(reader);\n        const status = el('div', { id: 'qr-status', style: 'font-size: 13px; color: var(--grey-500); text-align: center; margin-top: 10px;' }, 'Bezig met opstarten…');\n        m.appendChild(status);\n        setTimeout(() => initQrScanner(status), 50);\n      } else {\n        m.appendChild(el('div', { style: 'padding: 12px; background: var(--amber-light); color: var(--amber-dark); border-radius: var(--radius); font-size: 13px; margin-bottom: 12px;' },\n          'Camera niet bruikbaar — open de pagina via HTTPS of localhost.'));\n        m.appendChild(el('div', { style: 'font-size: 13px; line-height: 1.6;' },\n          el('div', {}, '• ', el('b', {}, 'Foto van QR uploaden'), ' — maak een foto van de QR-code en kies hieronder.'),\n          el('div', {}, '• ', el('b', {}, 'Handmatig invoeren'), ' — typ het projectnr-werkbonnr.')\n        ));\n      }\n      m.appendChild(el('div', { class: 'actions', style: 'flex-wrap: wrap;' },\n        el('button', { class: 'btn', onClick: () => { stopQrScanner(); closeModal(); } }, 'Annuleer'),\n        el('label', { class: 'btn', style: 'cursor: pointer;' },\n          '🖼 Foto van QR uploaden',\n          el('input', { type: 'file', accept: 'image/*', style: 'display: none;', onChange: async e => {\n            const f = e.target.files && e.target.files[0];\n            if (!f) return;\n            await scanQrFromImageFile(f);\n          } })\n        ),\n        el('button', { class: 'btn ghost', onClick: () => { stopQrScanner(); closeModal(); promptManualQrEntry(); } }, 'Handmatig invoeren')\n      ));\n    }\n  };\n  render();\n}\n\nasync function scanQrFromImageFile(file) {\n  try {\n    if (qrScanner) { try { await qrScanner.stop(); qrScanner.clear(); } catch(e){} qrScanner = null; }\n    let target = document.getElementById('qr-reader');\n    if (!target) {\n      target = document.createElement('div');\n      target.id = 'qr-reader-tmp';\n      target.style.display = 'none';\n      document.body.appendChild(target);\n    }\n    const tmpId = target.id;\n    const inst = new Html5Qrcode(tmpId);\n    const decoded = await inst.scanFile(file, false);\n    try { inst.clear(); } catch (e) {}\n    if (target.id === 'qr-reader-tmp') target.remove();\n    const parsed = parseQrPayload(decoded);\n    if (!parsed) { alert('QR-code gevonden maar onbekend formaat: ' + decoded); return; }\n    closeModal();\n    if (parsed.kind === 'spcpart') {\n      resolveSpcpartAndContinue(parsed);\n    } else {\n      resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);\n    }\n  } catch (e) {\n    alert('Geen QR-code gevonden in de foto: ' + (e && e.message ? e.message : e));\n  }\n}\n\nasync function initQrScanner(statusEl) {\n  try {\n    qrScanner = new Html5Qrcode('qr-reader');\n    const config = { fps: 10, qrbox: { width: 240, height: 240 } };\n    await qrScanner.start(\n      { facingMode: 'environment' },\n      config,\n      decodedText => onQrDecoded(decodedText, statusEl),\n      () => {}\n    );\n    if (statusEl) statusEl.textContent = 'Camera actief — richt op QR';\n  } catch (e) {\n    if (statusEl) statusEl.innerHTML = 'Kon camera niet starten: ' + (e && e.message ? e.message : e);\n  }\n}\n\nasync function stopQrScanner() {\n  if (qrScanner) {\n    try { await qrScanner.stop(); qrScanner.clear(); } catch (e) {}\n    qrScanner = null;\n  }\n}\n\nasync function onQrDecoded(text, statusEl) {\n  const parsed = parseQrPayload(text);\n  if (!parsed) {\n    if (statusEl) statusEl.textContent = 'Onbekende QR-code: ' + text.slice(0, 40);\n    return;\n  }\n  await stopQrScanner();\n  closeModal();\n  if (parsed.kind === 'spcpart') {\n    resolveSpcpartAndContinue(parsed);\n  } else {\n    resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);\n  }\n}\n\nfunction promptManualQrEntry() {\n  const v = prompt('Projectnummer-Werkbonnummer (bv. 325277-10300) of SPCPART-id:');\n  if (!v) return;\n  const parsed = parseQrPayload(v);\n  if (!parsed) { alert('Onbekend formaat. Verwacht: <projectnummer>-<werkbonnummer>'); return; }\n  if (parsed.kind === 'spcpart') {\n    resolveSpcpartAndContinue(parsed);\n  } else {\n    resolveQrTargetAndStartPhotos(parsed.project, parsed.werkbon);\n  }\n}\n\nfunction resolveQrTargetAndStartPhotos(projectNumber, werkbonNumber) {\n  const project = state.projects.find(p => String(p.number).trim() === String(projectNumber).trim());\n  if (!project) {\n    if (!confirm('Project ' + projectNumber + ' bestaat nog niet. Aanmaken?')) return;\n    const newProj = { id: uid(), number: projectNumber, klant: '', description: '', werkbonnen: [] };\n    state.projects.push(newProj);\n    save();\n    return resolveQrTargetAndStartPhotos(projectNumber, werkbonNumber);\n  }\n  let werkbon = project.werkbonnen.find(w => String(w.number).toUpperCase() === String(werkbonNumber).toUpperCase());\n  if (!werkbon) {\n    if (!confirm('Werkbon ' + werkbonNumber + ' bestaat nog niet binnen project ' + projectNumber + '. Aanmaken?')) return;\n    const inf = inferPartFromWerkbonNr(werkbonNumber);\n    werkbon = { id: uid(), number: werkbonNumber, description: inf.desc || werkbonNumber, zone: inf.zone, drawing_sheet: '', drawing_notes: '', weeks: [] };\n    project.werkbonnen.push(werkbon);\n    save();\n  }\n  const cw = getCurrentWeek();\n  let week = werkbon.weeks.find(x => x.week === cw);\n  if (!week) {\n    week = { id: uid(), week: cw, weekdoel: '', streef_pct: 50, photos: [], ai_pct: null, ai_toelichting: '', confirmed_pct: null, remark: '', sides: { voor: null, zijde: null, achter: null } };\n    werkbon.weeks.push(week);\n    save();\n  }\n  state.projectId = project.id;\n  state.werkbonId = werkbon.id;\n  state.weekId = week.id;\n  state.view = 'week';\n  render();\n  setTimeout(() => start3SidePhotoFlow(week), 200);\n}\n\nfunction showQrCodeForWerkbon(project, werkbon) {\n  if (typeof QRCode === 'undefined') { alert('QR-generator niet geladen.'); return; }\n  const payload = project.number + '-' + werkbon.number;\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'QR-code voor werkbon ' + werkbon.number));\n      m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px;' }, 'Print en plak deze sticker op de tank.'));\n      const box = el('div', { class: 'qr-code-box' });\n      const target = el('div', { id: 'qr-target' });\n      box.appendChild(target);\n      box.appendChild(el('div', { class: 'cap' }, payload));\n      m.appendChild(box);\n      m.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-top: 8px; text-align: center;' },\n        project.number + ' · ' + werkbon.number + ' — ' + werkbon.description));\n      m.appendChild(el('div', { class: 'actions' },\n        el('button', { class: 'btn', onClick: () => printQrLabel(project, werkbon, payload) }, 'Print sticker'),\n        el('button', { class: 'btn primary', onClick: closeModal }, 'Sluiten')\n      ));\n      setTimeout(() => {\n        try { new QRCode(target, { text: payload, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M }); } catch (e) { target.textContent = 'Genereren mislukt: ' + e.message; }\n      }, 30);\n    }\n  };\n  render();\n}\n\nfunction printQrLabel(project, werkbon, payload) {\n  const w = window.open('', '_blank', 'width=400,height=560');\n  if (!w) { alert('Pop-up geblokkeerd'); return; }\n  w.document.write('<html><head><title>QR ' + werkbon.number + '<\u002Ftitle><script src=\"https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js\"><\\/script><style>body{font-family:sans-serif;text-align:center;padding:24px;}.meta{font-size:12px;color:#555;margin-top:14px;}<\u002Fstyle><\u002Fhead><body><div id=\"q\"><\u002Fdiv><div class=\"meta\"><b>' + project.number + '<\u002Fb><br>Werkbon ' + werkbon.number + ' — ' + (werkbon.description || '') + '<\u002Fdiv><script>setTimeout(function(){new QRCode(document.getElementById(\"q\"),{text:\"' + payload + '\",width:240,height:240});setTimeout(function(){window.print();},200);},150);<\\/script><\u002Fbody><\u002Fhtml>');\n  w.document.close();\n}\n\n// Camera-capture: in-app camera met preview, fallback naar OS camera-app\nfunction captureSidePhoto(week, key) {\n  const cb = async dataUrl => {\n    if (!week.sides) week.sides = { voor: null, zijde: null, achter: null };\n    week.sides[key] = dataUrl;\n    save(); render();\n    toast('Foto ' + key + ' opgeslagen');\n  };\n  if (cameraAvailable()) openInAppCameraModal(cb);\n  else triggerNativeCameraInput(cb);\n}\n\nfunction triggerNativeCameraInput(callback) {\n  const inp = document.createElement('input');\n  inp.type = 'file';\n  inp.setAttribute('accept', 'image/*');\n  inp.setAttribute('capture', 'environment');\n  inp.style.position = 'fixed';\n  inp.style.left = '-9999px';\n  inp.onchange = async e => {\n    const f = e.target.files && e.target.files[0];\n    inp.remove();\n    if (!f) return;\n    const dataUrl = await processPhoto(f);\n    callback(dataUrl);\n  };\n  document.body.appendChild(inp);\n  inp.click();\n}\n\nfunction openInAppCameraModal(callback) {\n  let stream = null;\n  state.modal = {\n    onClose: () => { if (stream) stream.getTracks().forEach(t => t.stop()); },\n    render: m => {\n      m.appendChild(el('h3', {}, 'Foto maken'));\n      const wrap = el('div', { style: 'background: black; border-radius: var(--radius); overflow: hidden; aspect-ratio: 3/4; max-height: 60vh; margin-bottom: 12px;' });\n      const video = el('video', { autoplay: '', playsinline: '', muted: '', style: 'width: 100%; height: 100%; object-fit: cover; display: block;' });\n      wrap.appendChild(video);\n      m.appendChild(wrap);\n      const status = el('div', { style: 'font-size: 12px; color: var(--grey-500); text-align: center; margin-bottom: 8px;' }, 'Camera opstarten…');\n      m.appendChild(status);\n      const actions = el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap;' });\n      actions.appendChild(el('button', { class: 'btn', style: 'flex: 1;', onClick: closeModal }, 'Annuleer'));\n      const shootBtn = el('button', { class: 'btn primary lg', style: 'flex: 2;', disabled: '', onClick: () => {\n        try {\n          const canvas = document.createElement('canvas');\n          const w = video.videoWidth || 1024, h = video.videoHeight || 768;\n          const maxW = 1200, scale = Math.min(1, maxW / w);\n          canvas.width = Math.round(w * scale); canvas.height = Math.round(h * scale);\n          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);\n          const dataUrl = canvas.toDataURL('image/jpeg', 0.78);\n          if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }\n          closeModal();\n          callback(dataUrl);\n        } catch (e) { alert('Foto maken mislukt: ' + e.message); }\n      } }, '📸 Maak foto');\n      actions.appendChild(shootBtn);\n      m.appendChild(actions);\n      m.appendChild(el('div', { style: 'margin-top: 8px; text-align: center;' },\n        el('button', { class: 'btn ghost sm', onClick: () => {\n          if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }\n          closeModal();\n          triggerNativeCameraInput(callback);\n        } }, 'Gebruik OS camera-app')\n      ));\n      navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })\n        .then(s => {\n          stream = s; video.srcObject = s; video.play().catch(() => {});\n          status.textContent = 'Klaar — richt en tik op \"Maak foto\"';\n          shootBtn.removeAttribute('disabled');\n        })\n        .catch(err => {\n          status.innerHTML = 'Camera niet beschikbaar (' + (err.name || err) + ') — gebruik OS camera-app.';\n        });\n    }\n  };\n  render();\n}\n\nfunction start3SidePhotoFlow(week) {\n  if (!week.sides) week.sides = { voor: null, zijde: null, achter: null };\n  const steps = ['voor', 'zijde', 'achter'];\n  function renderModal(currentIdx) {\n    state.modal = {\n      render: m => {\n        m.appendChild(el('h3', {}, '3 foto’s maken — W' + week.week));\n        m.appendChild(el('p', { style: 'color: var(--grey-500); font-size: 13px;' }, 'Maak een foto van elke zijde.'));\n        steps.forEach((s, i) => {\n          const cls = 'qr-step' + (i === currentIdx ? ' active' : '') + (week.sides[s] ? ' done' : '');\n          const onCapture = dataUrl => {\n            week.sides[s] = dataUrl;\n            save();\n            const next = (i + 1 < steps.length && !week.sides[steps[i + 1]]) ? i + 1 : i;\n            renderModal(next);\n          };\n          const step = el('div', { class: cls, onClick: () => {\n            if (cameraAvailable()) openInAppCameraModal(onCapture);\n            else triggerNativeCameraInput(onCapture);\n          } },\n            el('div', { class: 'num' }, String(i + 1)),\n            el('div', {}, s.charAt(0).toUpperCase() + s.slice(1) + (week.sides[s] ? ' — gemaakt' : ''))\n          );\n          m.appendChild(step);\n          if (week.sides[s]) {\n            m.appendChild(el('div', { style: 'aspect-ratio: 4/3; border-radius: 6px; overflow: hidden; margin-bottom: 8px; max-width: 220px;' },\n              el('img', { src: week.sides[s], style: 'width: 100%; height: 100%; object-fit: cover;' })\n            ));\n          }\n        });\n        const allDone = steps.every(s => week.sides[s]);\n        m.appendChild(el('div', { class: 'actions' },\n          el('button', { class: 'btn', onClick: closeModal }, allDone ? 'Klaar' : 'Sluiten'),\n          allDone ? el('button', { class: 'btn primary', onClick: () => { closeModal(); render(); toast('3 zijden vastgelegd'); } }, 'Klaar') : null\n        ));\n      }\n    };\n    render();\n  }\n  renderModal(0);\n}\n\n// ---------- Settings modal ----------\nfunction showSettingsModal() {\n  let name = getUsername();\n  const sectionH = txt => el('h3', { style: 'font-size: 13px; color: var(--grey-500); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 16px; margin-bottom: 6px;' }, txt);\n  state.modal = {\n    render: m => {\n      m.appendChild(el('h3', {}, 'Instellingen'));\n      m.appendChild(sectionH('Wie ben ik?'));\n      m.appendChild(el('div', { class: 'field' },\n        el('label', {}, 'Naam (bij wijzigingen in het gedeelde bestand)'),\n        el('input', { placeholder: 'bv. Jarno of Peter', value: name, onInput: e => name = e.target.value.trim() })\n      ));\n\n      m.appendChild(sectionH('Bouwplan importeren (werkt overal)'));\n      m.appendChild(el('div', { style: 'font-size: 13px; color: var(--grey-500); margin-bottom: 8px;' },\n        'Werkt op telefoon, tablet en PC. Kies een Excel-bestand (Productionplans Lopik.xlsx) — eenmalige import.'));\n      m.appendChild(el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap;' },\n        el('button', { class: 'btn primary', onClick: () => { closeModal(); importExcelViaPlainInput(); } }, '📂 Upload Excel-bouwplan')\n      ));\n\n      m.appendChild(sectionH('Data delen tussen apparaten'));\n      m.appendChild(el('div', { style: 'font-size: 13px; color: var(--grey-500); margin-bottom: 8px;' },\n        'Op de PC: download een JSON-bestand. Op telefoon/tablet: laad dat bestand in. Werkt overal.'));\n      m.appendChild(el('div', { style: 'display: flex; gap: 8px; flex-wrap: wrap;' },\n        el('button', { class: 'btn', onClick: downloadDataAsFile }, '⬇ Download JSON (' + state.projects.length + ' projecten)'),\n        el('button', { class: 'btn', onClick: () => loadDataFromFile(false) }, '⬆ Upload JSON (vervang)'),\n        el('button', { class: 'btn', onClick: () => loadDataFromFile(true) }, '⬆ Upload JSON (samenvoegen)')\n      ));\n\n      m.appendChild(sectionH('Auto-sync (alleen desktop Chrome/Edge)'));\n      if (!fsaSupported()) {\n        m.appendChild(el('div', { style: 'padding: 10px; background: var(--amber-light); color: var(--amber-dark); border-radius: var(--radius); font-size: 12px;' },\n          'Deze browser ondersteunt geen live-link. Gebruik de upload/download-knoppen hierboven.'));\n      } else if (fileHandle) {\n        m.appendChild(el('div', { style: 'padding: 10px; background: var(--teal-light); color: var(--teal-dark); border-radius: var(--radius); font-size: 12px; margin-bottom: 8px;' },\n          el('div', {}, 'Gekoppeld: ' + fileHandle.name),\n          el('div', { style: 'font-size: 11px; opacity: 0.85;' }, state.projects.length + ' projecten lokaal')\n        ));\n        m.appendChild(el('div', { style: 'display: flex; gap: 6px; flex-wrap: wrap;' },\n          el('button', { class: 'btn sm', onClick: async () => { await readFromFile(); render(); toast('Geladen: ' + state.projects.length + ' projecten'); } }, 'Ververs'),\n          el('button', { class: 'btn sm danger', onClick: disconnectSharedFile }, 'Ontkoppel')\n        ));\n      } else {\n        m.appendChild(el('div', { style: 'font-size: 12px; color: var(--grey-500); margin-bottom: 8px;' },\n          'Auto-sync werkt op desktop Chrome/Edge. Op mobiel onbetrouwbaar — gebruik upload/download.'));\n        m.appendChild(el('div', { style: 'display: flex; gap: 6px; flex-wrap: wrap;' },\n          el('button', { class: 'btn sm', onClick: () => { setUsername(name); connectSharedFile('open'); closeModal(); } }, 'Koppel bestaand'),\n          el('button', { class: 'btn sm', onClick: () => { setUsername(name); connectSharedFile('new'); closeModal(); } }, 'Nieuw aanmaken')\n        ));\n      }\n\n      m.appendChild(el('div', { class: 'actions' },\n        el('button', { class: 'btn primary', onClick: () => { setUsername(name); closeModal(); } }, 'Sluiten')\n      ));\n    }\n  };\n  render();\n}\n\n// ---------- Boot ----------\nload();\nrender();\n(async () => {\n  await tryRestoreHandle();\n  await tryRestoreExcelHandle();\n  if (!getUsername()) {\n    const n = prompt('Welkom bij FloorScan.\\nVul je naam in:', '');\n    if (n && n.trim()) setUsername(n.trim());\n  }\n  render();\n})();\n<\u002Fscript>\n\n<!-- ============================================================ -->\n<!-- PWA: service worker registratie + install/update UX           -->\n<!-- Geïsoleerd in eigen <script> blok zodat bestaande app-logica  -->\n<!-- ongewijzigd blijft. Faalt stil op file:// (geen SW mogelijk). -->\n<!-- ============================================================ -->\n<script>\n(function pwaBootstrap() {\n  'use strict';\n\n  // 1. Service worker registratie — alleen op http(s), niet op file://\n  if (!('serviceWorker' in navigator)) return;\n  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {\n    console.info('[FloorScan PWA] service worker overgeslagen — vereist HTTPS of localhost.');\n    return;\n  }\n\n  let refreshing = false;\n  navigator.serviceWorker.addEventListener('controllerchange', () => {\n    if (refreshing) return;\n    refreshing = true;\n    window.location.reload();\n  });\n\n  navigator.serviceWorker.register('sw.js', { scope: './' })\n    .then(reg => {\n      console.info('[FloorScan PWA] service worker geregistreerd, scope:', reg.scope);\n\n      // Detect updates → toon banner met \"Bijwerken\" knop\n      reg.addEventListener('updatefound', () => {\n        const installing = reg.installing;\n        if (!installing) return;\n        installing.addEventListener('statechange', () => {\n          if (installing.state === 'installed' && navigator.serviceWorker.controller) {\n            // Nieuwe versie staat klaar; vraag user om te verversen\n            showPwaBanner({\n              text: 'Nieuwe versie van FloorScan beschikbaar.',\n              action: 'Bijwerken',\n              onAction: () => {\n                installing.postMessage({ type: 'SKIP_WAITING' });\n              }\n            });\n          }\n        });\n      });\n\n      // Periodiek check (eens per uur in foreground) — handig op tablets die nooit echt sluiten\n      setInterval(() => { reg.update().catch(() => {}); }, 60 * 60 * 1000);\n    })\n    .catch(err => {\n      console.warn('[FloorScan PWA] service worker registratie mislukt:', err);\n    });\n\n  // 2. Install-prompt vangen (Chrome/Edge/Android)\n  let deferredInstallPrompt = null;\n  window.addEventListener('beforeinstallprompt', (e) => {\n    e.preventDefault();\n    deferredInstallPrompt = e;\n    // Toon alleen als de user 'm nog niet eerder heeft afgewezen deze sessie\n    if (sessionStorage.getItem('floorscan_install_dismissed')) return;\n    showPwaBanner({\n      text: 'Installeer FloorScan op het beginscherm voor sneller starten.',\n      action: 'Installeren',\n      onAction: async () => {\n        if (!deferredInstallPrompt) return;\n        deferredInstallPrompt.prompt();\n        try { await deferredInstallPrompt.userChoice; } catch (e) {}\n        deferredInstallPrompt = null;\n      }\n    });\n  });\n\n  window.addEventListener('appinstalled', () => {\n    console.info('[FloorScan PWA] geïnstalleerd op homescreen');\n    deferredInstallPrompt = null;\n    hidePwaBanner();\n  });\n\n  // 3. Banner UI (zelfstandig, geen afhankelijkheid van app render-loop)\n  function showPwaBanner({ text, action, onAction }) {\n    hidePwaBanner();\n    const bar = document.createElement('div');\n    bar.className = 'pwa-banner';\n    bar.id = 'pwa-banner';\n    const span = document.createElement('span');\n    span.textContent = text;\n    span.style.flex = '1';\n    const actBtn = document.createElement('button');\n    actBtn.textContent = action;\n    actBtn.addEventListener('click', () => {\n      try { onAction && onAction(); } catch (e) { console.warn(e); }\n      hidePwaBanner();\n    });\n    const closeBtn = document.createElement('button');\n    closeBtn.className = 'pwa-close';\n    closeBtn.textContent = '×';\n    closeBtn.setAttribute('aria-label', 'Sluiten');\n    closeBtn.addEventListener('click', () => {\n      sessionStorage.setItem('floorscan_install_dismissed', '1');\n      hidePwaBanner();\n    });\n    bar.appendChild(span);\n    bar.appendChild(actBtn);\n    bar.appendChild(closeBtn);\n    document.body.appendChild(bar);\n  }\n  function hidePwaBanner() {\n    const b = document.getElementById('pwa-banner');\n    if (b) b.remove();\n  }\n})();\n\n// ============================================================\n// PWA: inkomende bestanden via share-target en file_handlers\n// ============================================================\n(function pwaInbox() {\n  'use strict';\n\n  const SHARE_INBOX_DB = 'floorscan_share';\n  const SHARE_INBOX_STORE = 'inbox';\n  const SHARE_INBOX_KEY = 'pending';\n\n  // 1) share-target: SW heeft een POST opgevangen, file in IDB gezet, en redirected naar\n  //    deze pagina met ?share=1. Pak het bestand op en gooi het in de import-pipeline.\n  async function consumeSharedInbox() {\n    const url = new URL(location.href);\n    if (url.searchParams.get('share') !== '1') return;\n    // Maak URL meteen schoon zodat reload geen replay veroorzaakt\n    history.replaceState({}, '', location.pathname);\n    try {\n      const item = await idbInboxGet();\n      if (item) {\n        await idbInboxClear();\n        // Wacht tot de app gerenderd is voordat we modal openen\n        await waitForAppReady();\n        if (typeof processIncomingFile === 'function') {\n          processIncomingFile(item, 'merge');\n        } else {\n          console.warn('[FloorScan PWA] processIncomingFile niet beschikbaar — app niet geladen?');\n        }\n      }\n    } catch (err) {\n      console.warn('[FloorScan PWA] shared-inbox lezen mislukt', err);\n    }\n  }\n\n  // 2) file_handlers (launchQueue): user heeft \"Open with FloorScan\" gekozen vanuit\n  //    een Files-app. Bestand komt binnen als FileSystemFileHandle.\n  function consumeLaunchQueue() {\n    if (!('launchQueue' in window) || !('LaunchParams' in window)) return;\n    try {\n      window.launchQueue.setConsumer(async (params) => {\n        if (!params || !params.files || !params.files.length) return;\n        await waitForAppReady();\n        for (const handle of params.files) {\n          try {\n            const file = await handle.getFile();\n            if (typeof processIncomingFile === 'function') {\n              processIncomingFile(file, 'merge');\n              break; // 1 bestand tegelijk verwerken\n            }\n          } catch (err) {\n            console.warn('[FloorScan PWA] launch file lezen mislukt', err);\n          }\n        }\n      });\n    } catch (err) {\n      console.warn('[FloorScan PWA] launchQueue setup mislukt', err);\n    }\n  }\n\n  function waitForAppReady() {\n    return new Promise(resolve => {\n      const check = () => {\n        if (typeof processIncomingFile === 'function' && document.getElementById('app')) {\n          resolve();\n        } else {\n          setTimeout(check, 100);\n        }\n      };\n      check();\n    });\n  }\n\n  function idbInboxGet() {\n    return new Promise((resolve, reject) => {\n      const req = indexedDB.open(SHARE_INBOX_DB, 1);\n      req.onupgradeneeded = (e) => {\n        const db = e.target.result;\n        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {\n          db.createObjectStore(SHARE_INBOX_STORE);\n        }\n      };\n      req.onsuccess = (e) => {\n        const db = e.target.result;\n        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {\n          resolve(null); return;\n        }\n        const tx = db.transaction(SHARE_INBOX_STORE, 'readonly');\n        const r = tx.objectStore(SHARE_INBOX_STORE).get(SHARE_INBOX_KEY);\n        r.onsuccess = () => resolve(r.result || null);\n        r.onerror = () => reject(r.error);\n      };\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  function idbInboxClear() {\n    return new Promise((resolve, reject) => {\n      const req = indexedDB.open(SHARE_INBOX_DB, 1);\n      req.onsuccess = (e) => {\n        const db = e.target.result;\n        if (!db.objectStoreNames.contains(SHARE_INBOX_STORE)) {\n          resolve(); return;\n        }\n        const tx = db.transaction(SHARE_INBOX_STORE, 'readwrite');\n        tx.objectStore(SHARE_INBOX_STORE).delete(SHARE_INBOX_KEY);\n        tx.oncomplete = () => resolve();\n        tx.onerror = () => reject(tx.error);\n      };\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  // Start beide flows\n  consumeSharedInbox();\n  consumeLaunchQueue();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
